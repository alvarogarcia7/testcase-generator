# Cargo configuration for coverage builds

[build]
# Require llvm-tools-preview component for coverage instrumentation
rustflags = []

# sccache configuration for build caching
#
# Global cache directory: Share compilation cache across multiple worktrees
# This is set in the user's home directory to enable cache reuse between different
# git worktrees and checkouts of this repository
#
# To enable sccache for local development:
#   1. Install sccache: make install-sccache
#   2. Set RUSTC_WRAPPER environment variable: export RUSTC_WRAPPER=sccache
#   3. Add to shell profile (~/.bashrc, ~/.zshrc): echo 'export RUSTC_WRAPPER=sccache' >> ~/.bashrc
#
# CI environments (GitLab CI) set RUSTC_WRAPPER in their configuration
# GitHub Actions uses RustCrypto/actions/cargo-cache instead
[env]
SCCACHE_DIR = { value = "$HOME/.cache/sccache/testcase-manager", force = true, relative = false }

[target.'cfg(all())']
# Set default RUSTFLAGS for coverage builds with instrument-coverage flag
# This enables source-based code coverage instrumentation
rustflags = ["-C", "instrument-coverage"]

# Cargo aliases for coverage-related tasks
[alias]
# Run tests with coverage instrumentation
coverage = "llvm-cov --all-features"

# Generate HTML coverage report and open in browser
coverage-html = "llvm-cov --all-features --html --open"

# Display coverage summary report in terminal
coverage-report = "llvm-cov --all-features --summary-only"

# Clean coverage artifacts
coverage-clean = "llvm-cov clean"

# Run tests with all features enabled (for development without coverage)
test-all = "test --all-features"
