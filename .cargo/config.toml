# Cargo configuration for coverage builds

[build]
# Require llvm-tools-preview component for coverage instrumentation
rustflags = []

# ============================================================================
# sccache Configuration (Compiler Cache for Faster Builds)
# ============================================================================
#
# sccache is enabled via environment variables (not in this config file).
# Cargo's config.toml does not support runtime conditional evaluation,
# so we use environment variables that cargo reads directly.
#
# QUICK START:
#   1. Install sccache: make install-sccache
#   2. Enable for your session: source scripts/setup-sccache-env.sh
#   3. Build as normal: cargo build
#
# ENVIRONMENT VARIABLES:
#   - RUSTC_WRAPPER: Set to "sccache" to enable compiler caching
#   - SCCACHE_DIR: Cache directory location
#     * For local builds: .sccache/host
#     * For Docker builds: .sccache/docker
#   - USE_SCCACHE: Control variable (1=enable, 0=disable)
#   - DOCKER_BUILD: Build type indicator (1=docker, 0=local)
#
# USAGE EXAMPLES:
#
#   Local build with sccache:
#     USE_SCCACHE=1 source scripts/setup-sccache-env.sh && cargo build
#
#   Docker build with sccache:
#     USE_SCCACHE=1 DOCKER_BUILD=1 source scripts/setup-sccache-env.sh && cargo build
#
#   Manual setup (without script):
#     export RUSTC_WRAPPER=sccache
#     export SCCACHE_DIR=.sccache/host
#     cargo build
#
# CACHE LOCATIONS:
#   - Local: .sccache/host/ (gitignored)
#   - Docker: .sccache/docker/ (gitignored)
#
# BENEFITS:
#   - 50-90% faster incremental builds
#   - Shared cache between branches and clean builds
#   - Separate caches prevent conflicts between local and Docker builds
#
# SEE ALSO:
#   - docs/SCCACHE.md - Comprehensive sccache documentation
#   - docs/SCCACHE_SETUP.md - Setup and configuration guide
#   - scripts/setup-sccache-env.sh - Environment setup script
#   - make install-sccache - Install sccache
#   - make sccache-stats - View cache statistics
#   - make sccache-clean - Clear cache
# ============================================================================

[target.'cfg(all())']
# Set default RUSTFLAGS for coverage builds with instrument-coverage flag
# This enables source-based code coverage instrumentation
rustflags = ["-C", "instrument-coverage"]

# Cargo aliases for coverage-related tasks
[alias]
# Run tests with coverage instrumentation
coverage = "llvm-cov --all-features"

# Generate HTML coverage report and open in browser
coverage-html = "llvm-cov --all-features --html --open"

# Display coverage summary report in terminal
coverage-report = "llvm-cov --all-features --summary-only"

# Clean coverage artifacts
coverage-clean = "llvm-cov clean"

# Run tests with all features enabled (for development without coverage)
test-all = "test --all-features"
