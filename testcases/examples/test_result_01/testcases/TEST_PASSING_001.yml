type: test_case
schema: tcms/test-case.schema.v1.json
requirement: TEST_REQ_001
item: 1
tc: 1
id: TEST_PASSING_001
description: Test case with all passing verifications
general_initial_conditions:
  System:
  - Ready
initial_conditions:
  Device:
  - Connected
test_sequences:
- id: 1
  name: Passing Sequence
  description: All steps should pass
  initial_conditions:
    LPA:
    - Active
  steps:
  - step: 1
    description: Echo hello
    command: echo 'hello'
    expected:
      success: true
      result: '0'
      output: hello
    verification:
      result: '[[ $EXIT_CODE -eq 0 ]]'
      output: '[[ "$COMMAND_OUTPUT" == "hello" ]]'
  - step: 2
    description: True command
    command: 'true'
    expected:
      success: true
      result: '0'
      output: ''
    verification:
      result: '[[ $EXIT_CODE -eq 0 ]]'
      output: 'true'
- id: 2
  name: Second Passing Sequence
  description: Another sequence that passes
  initial_conditions:
    System:
    - Ready
  steps:
  - step: 1
    description: Echo world
    command: echo 'world'
    expected:
      success: true
      result: '0'
      output: world
    verification:
      result: '[[ $EXIT_CODE -eq 0 ]]'
      output: '[[ "$COMMAND_OUTPUT" == "world" ]]'
