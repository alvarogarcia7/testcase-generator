type: test_case
schema: tcms/test-case.schema.v1.json
requirement: TEST_PRECOMP_MULTI_SEQ
item: 1
tc: 1
id: TEST_PRECOMP_MULTI_SEQ_001
description: 'Precomputed verification: multiple sequences with mixed results'
general_initial_conditions:
  system:
  - Shell environment is available
initial_conditions:
  system:
  - All commands can be executed
test_sequences:
- id: 1
  name: First Sequence - All Pass
  description: 'First test sequence where all steps pass verification.

    '
  initial_conditions:
    system:
    - Shell is ready
  steps:
  - step: 1
    description: Execute first command in sequence 1
    command: echo "Seq1 Step1"
    expected:
      success: true
      result: 0
      output: Seq1 Step1
    verification:
      result: '[[ $EXIT_CODE -eq 0 ]]'
      output: grep -q 'Seq1 Step1' <<< "$COMMAND_OUTPUT"
  - step: 2
    description: Execute second command in sequence 1
    command: echo "Seq1 Step2"
    expected:
      success: true
      result: 0
      output: Seq1 Step2
    verification:
      result: '[[ $EXIT_CODE -eq 0 ]]'
      output: grep -q 'Seq1 Step2' <<< "$COMMAND_OUTPUT"
- id: 2
  name: Second Sequence - One Failure
  description: 'Second test sequence where step 2 fails verification.

    '
  initial_conditions:
    system:
    - Shell is ready
  steps:
  - step: 1
    description: Execute first command in sequence 2
    command: echo "Seq2 Step1"
    expected:
      success: true
      result: 0
      output: Seq2 Step1
    verification:
      result: '[[ $EXIT_CODE -eq 0 ]]'
      output: grep -q 'Seq2 Step1' <<< "$COMMAND_OUTPUT"
  - step: 2
    description: Execute second command in sequence 2 with failure
    command: echo "Seq2 Step2"
    expected:
      success: true
      result: 0
      output: Seq2 Step2
    verification:
      result: '[[ $EXIT_CODE -eq 0 ]]'
      output: grep -q 'Seq2 Step2' <<< "$COMMAND_OUTPUT"
