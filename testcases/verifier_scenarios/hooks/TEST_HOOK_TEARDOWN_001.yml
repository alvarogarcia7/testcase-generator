requirement: "HOOK_TEARDOWN_TEST_ERROR"
item: 1
tc: 1
id: 'TEST_HOOK_TEARDOWN_001'
description: 'Hook error scenario for teardown_test hook - script exits with error code during test cleanup'

general_initial_conditions:
  system:
    - "Shell environment is available"

initial_conditions:
  system:
    - "All commands can be executed"

hooks:
  teardown_test:
    command: "scripts/hook_teardown_error.sh"
    on_error: "fail"

test_sequences:
  - id: 1
    name: "First Sequence - Completes Successfully"
    description: |
                   First test sequence where all steps execute successfully.
                   The teardown_test hook will fail after all sequences complete,
                   demonstrating error handling in the final test cleanup phase.
    initial_conditions:
      system:
        - "Shell is ready"
    steps:
      - step: 1
        description: "Execute first step of sequence 1"
        command: echo "Sequence 1 - Step 1 executed"
        expected:
          success: true
          result: 0
          output: "Sequence 1 - Step 1 executed"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q 'Sequence 1 - Step 1 executed' <<< \"$COMMAND_OUTPUT\""
      - step: 2
        description: "Execute second step of sequence 1"
        command: echo "Sequence 1 - Step 2 executed"
        expected:
          success: true
          result: 0
          output: "Sequence 1 - Step 2 executed"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q 'Sequence 1 - Step 2 executed' <<< \"$COMMAND_OUTPUT\""

  - id: 2
    name: "Second Sequence - Completes Successfully"
    description: |
                   Second test sequence where all steps execute successfully.
                   All test sequences complete before the teardown_test hook fails.
    initial_conditions:
      system:
        - "Shell is ready"
    steps:
      - step: 1
        description: "Execute first step of sequence 2"
        command: echo "Sequence 2 - Step 1 executed"
        expected:
          success: true
          result: 0
          output: "Sequence 2 - Step 1 executed"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q 'Sequence 2 - Step 1 executed' <<< \"$COMMAND_OUTPUT\""
      - step: 2
        description: "Execute second step of sequence 2"
        command: echo "Sequence 2 - Step 2 executed"
        expected:
          success: true
          result: 0
          output: "Sequence 2 - Step 2 executed"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q 'Sequence 2 - Step 2 executed' <<< \"$COMMAND_OUTPUT\""

  - id: 3
    name: "Third Sequence - Completes Successfully"
    description: |
                   Third test sequence that completes all steps successfully.
                   After this sequence completes, teardown_test hook will fail.
    initial_conditions:
      system:
        - "Shell is ready"
    steps:
      - step: 1
        description: "Execute final step"
        command: echo "Sequence 3 - Step 1 executed"
        expected:
          success: true
          result: 0
          output: "Sequence 3 - Step 1 executed"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q 'Sequence 3 - Step 1 executed' <<< \"$COMMAND_OUTPUT\""
