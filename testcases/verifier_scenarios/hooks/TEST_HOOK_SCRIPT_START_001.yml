requirement: "HOOK_SCRIPT_START_ERROR"
item: 1
tc: 1
id: 'TEST_HOOK_SCRIPT_START_001'
description: 'Hook error scenario for script_start hook - script exits with error code'

general_initial_conditions:
  system:
    - "Shell environment is available"

initial_conditions:
  system:
    - "All commands can be executed"

hooks:
  script_start:
    command: "scripts/hook_script_start_error.sh"
    on_error: "fail"

test_sequences:
  - id: 1
    name: "Test Sequence After Failed Hook"
    description: |
                   This test sequence should never execute because the script_start hook fails.
                   The script_start hook exits with code 1, causing immediate test failure.
    initial_conditions:
      system:
        - "Shell is ready"
    steps:
      - step: 1
        description: "This step should not execute"
        command: echo "Step 1 should not run"
        expected:
          success: true
          result: 0
          output: "Step 1 should not run"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q 'Step 1 should not run' <<< \"$COMMAND_OUTPUT\""
      - step: 2
        description: "This step should not execute"
        command: echo "Step 2 should not run"
        expected:
          success: true
          result: 0
          output: "Step 2 should not run"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q 'Step 2 should not run' <<< \"$COMMAND_OUTPUT\""
