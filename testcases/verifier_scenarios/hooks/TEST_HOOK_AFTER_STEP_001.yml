type: test_case
schema: tcms/test-case.schema.v1.json
requirement: HOOK_AFTER_STEP_ERROR
item: 1
tc: 1
id: TEST_HOOK_AFTER_STEP_001
description: Hook error scenario for after_step hook - script exits with error code
  after second step
general_initial_conditions:
  system:
  - Shell environment is available
initial_conditions:
  system:
  - All commands can be executed
hooks:
  after_step:
    command: scripts/hook_after_step_error.sh
    on_error: fail
test_sequences:
- id: 1
  name: First Sequence - After Step Hook Fails After Step 2
  description: 'First test sequence where steps 1 and 2 execute successfully.

    After step 2 completes, the after_step hook fails with error code 1.

    Steps 3 and 4 should not execute due to the hook failure.

    '
  initial_conditions:
    system:
    - Shell is ready
  steps:
  - step: 1
    description: Execute first step - after_step hook succeeds
    command: echo "Sequence 1 - Step 1 executed"
    expected:
      success: true
      result: 0
      output: Sequence 1 - Step 1 executed
    verification:
      result: '[[ $EXIT_CODE -eq 0 ]]'
      output: grep -q 'Sequence 1 - Step 1 executed' <<< "$COMMAND_OUTPUT"
  - step: 2
    description: Execute second step - after_step hook fails after this
    command: echo "Sequence 1 - Step 2 executed"
    expected:
      success: true
      result: 0
      output: Sequence 1 - Step 2 executed
    verification:
      result: '[[ $EXIT_CODE -eq 0 ]]'
      output: grep -q 'Sequence 1 - Step 2 executed' <<< "$COMMAND_OUTPUT"
  - step: 3
    description: This step should not execute - after_step hook failed
    command: echo "Sequence 1 - Step 3 should not run"
    expected:
      success: true
      result: 0
      output: Sequence 1 - Step 3 should not run
    verification:
      result: '[[ $EXIT_CODE -eq 0 ]]'
      output: grep -q 'Sequence 1 - Step 3 should not run' <<< "$COMMAND_OUTPUT"
  - step: 4
    description: This step should not execute - test terminated
    command: echo "Sequence 1 - Step 4 should not run"
    expected:
      success: true
      result: 0
      output: Sequence 1 - Step 4 should not run
    verification:
      result: '[[ $EXIT_CODE -eq 0 ]]'
      output: grep -q 'Sequence 1 - Step 4 should not run' <<< "$COMMAND_OUTPUT"
- id: 2
  name: Second Sequence - Not Executed
  description: 'Second test sequence that should not execute due to previous after_step
    hook failure.

    The after_step hook failed after step 2 of sequence 1, causing test termination.

    '
  initial_conditions:
    system:
    - Shell is ready
  steps:
  - step: 1
    description: This step should not execute
    command: echo "Sequence 2 - Step 1 should not run"
    expected:
      success: true
      result: 0
      output: Sequence 2 - Step 1 should not run
    verification:
      result: '[[ $EXIT_CODE -eq 0 ]]'
      output: grep -q 'Sequence 2 - Step 1 should not run' <<< "$COMMAND_OUTPUT"
  - step: 2
    description: This step should not execute
    command: echo "Sequence 2 - Step 2 should not run"
    expected:
      success: true
      result: 0
      output: Sequence 2 - Step 2 should not run
    verification:
      result: '[[ $EXIT_CODE -eq 0 ]]'
      output: grep -q 'Sequence 2 - Step 2 should not run' <<< "$COMMAND_OUTPUT"
