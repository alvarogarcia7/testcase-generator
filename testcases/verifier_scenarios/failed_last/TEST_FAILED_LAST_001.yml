type: test_case
schema: tcms/test-case.schema.v1.json
requirement: FAILED_LAST_STEP
item: 1
tc: 1
id: TEST_FAILED_LAST_001
description: Test case demonstrating failed last step scenario where steps 1-3 pass
  successfully but step 4 fails due to output mismatch (expected SUCCESS but got FAILURE)
general_initial_conditions:
  system:
  - Shell environment is available
initial_conditions:
  system:
  - All commands can be executed
test_sequences:
- id: 1
  name: Failed Last Step Sequence
  description: 'This test sequence demonstrates a scenario where steps 1-3 execute
    successfully,

    but step 4 fails due to output mismatch.

    The command produces ''FAILURE'' but the verification expects ''SUCCESS''.

    '
  initial_conditions:
    system:
    - Shell is ready
  steps:
  - step: 1
    description: Create a temporary directory
    command: mkdir -p /tmp/test_last_step_dir
    expected:
      success: true
      result: 0
      output: ''
    verification:
      result: '[[ $EXIT_CODE -eq 0 ]]'
      output: 'true'
  - step: 2
    description: Create a status file with initial content
    command: echo "initialized" > /tmp/test_last_step_dir/status.txt
    expected:
      success: true
      result: 0
      output: ''
    verification:
      result: '[[ $EXIT_CODE -eq 0 ]]'
      output: 'true'
  - step: 3
    description: Verify the file was created
    command: cat /tmp/test_last_step_dir/status.txt
    expected:
      success: true
      result: 0
      output: initialized
    verification:
      result: '[[ $EXIT_CODE -eq 0 ]]'
      output: grep -q 'initialized' <<< "$COMMAND_OUTPUT"
  - step: 4
    description: Check final status (fails with output mismatch)
    command: echo "FAILURE"
    expected:
      success: true
      result: 0
      output: SUCCESS
    verification:
      result: '[[ $EXIT_CODE -eq 0 ]]'
      output: grep -q 'SUCCESS' <<< "$COMMAND_OUTPUT"
