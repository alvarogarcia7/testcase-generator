requirement: "EDGE_EXTRA_STEPS"
item: 1
tc: 1
id: 'TEST_EDGE_EXTRA_STEPS_001'
description: 'Edge case: execution log has steps not in test case'

general_initial_conditions:
  system:
    - "Shell environment is available"

initial_conditions:
  system:
    - "All commands can be executed"

test_sequences:
  - id: 1
    name: "Extra Steps Sequence"
    description: |
                   Test sequence where execution log contains steps not defined in test case.
                   Test case defines steps 1, 2, 3; log has steps 1, 2, 3, 4, 5.
    initial_conditions:
      system:
        - "Shell is ready"
    steps:
      - step: 1
        description: "Execute step 1"
        command: echo "Step 1 executed"
        expected:
          success: true
          result: 0
          output: "Step 1 executed"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q 'Step 1 executed' <<< \"$COMMAND_OUTPUT\""
      - step: 2
        description: "Execute step 2"
        command: echo "Step 2 executed"
        expected:
          success: true
          result: 0
          output: "Step 2 executed"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q 'Step 2 executed' <<< \"$COMMAND_OUTPUT\""
      - step: 3
        description: "Execute step 3"
        command: echo "Step 3 executed"
        expected:
          success: true
          result: 0
          output: "Step 3 executed"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q 'Step 3 executed' <<< \"$COMMAND_OUTPUT\""
