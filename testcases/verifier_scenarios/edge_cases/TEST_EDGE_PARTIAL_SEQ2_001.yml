type: test_case
schema: tcms/test-case.schema.v1.json
requirement: EDGE_PARTIAL_SEQ2
item: 1
tc: 1
id: TEST_EDGE_PARTIAL_SEQ2_001
description: 'Edge case: multi-sequence with seq 1 complete, seq 2 step 1 only'
general_initial_conditions:
  system:
  - Shell environment is available
initial_conditions:
  system:
  - All commands can be executed
test_sequences:
- id: 1
  name: First Sequence Complete
  description: 'First test sequence with all steps executed successfully.

    Both steps pass verification.

    '
  initial_conditions:
    system:
    - Shell is ready
  steps:
  - step: 1
    description: Execute first step
    command: echo "Sequence 1 - Step 1"
    expected:
      success: true
      result: 0
      output: Sequence 1 - Step 1
    verification:
      result: '[[ $EXIT_CODE -eq 0 ]]'
      output: grep -q 'Sequence 1 - Step 1' <<< "$COMMAND_OUTPUT"
  - step: 2
    description: Execute second step
    command: echo "Sequence 1 - Step 2"
    expected:
      success: true
      result: 0
      output: Sequence 1 - Step 2
    verification:
      result: '[[ $EXIT_CODE -eq 0 ]]'
      output: grep -q 'Sequence 1 - Step 2' <<< "$COMMAND_OUTPUT"
- id: 2
  name: Second Sequence Partial
  description: 'Second test sequence with only step 1 executed.

    Step 2 is missing from execution log.

    '
  initial_conditions:
    system:
    - Shell is ready
  steps:
  - step: 1
    description: Execute first step
    command: echo "Sequence 2 - Step 1"
    expected:
      success: true
      result: 0
      output: Sequence 2 - Step 1
    verification:
      result: '[[ $EXIT_CODE -eq 0 ]]'
      output: grep -q 'Sequence 2 - Step 1' <<< "$COMMAND_OUTPUT"
  - step: 2
    description: Missing second step
    command: echo "Sequence 2 - Step 2"
    expected:
      success: true
      result: 0
      output: Sequence 2 - Step 2
    verification:
      result: '[[ $EXIT_CODE -eq 0 ]]'
      output: grep -q 'Sequence 2 - Step 2' <<< "$COMMAND_OUTPUT"
