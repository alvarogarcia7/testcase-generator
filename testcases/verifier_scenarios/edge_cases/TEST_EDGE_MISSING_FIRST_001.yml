type: test_case
schema: tcms/test-case.schema.v1.json
requirement: EDGE_MISSING_FIRST
item: 1
tc: 1
id: TEST_EDGE_MISSING_FIRST_001
description: 'Edge case: first step missing from log while others executed'
general_initial_conditions:
  system:
  - Shell environment is available
initial_conditions:
  system:
  - All commands can be executed
test_sequences:
- id: 1
  name: Missing First Step Sequence
  description: 'Test sequence where step 1 is missing from execution log.

    Steps 2 and 3 are present and pass verification.

    '
  initial_conditions:
    system:
    - Shell is ready
  steps:
  - step: 1
    description: Missing step - never executed
    command: echo "Step 1 missing"
    expected:
      success: true
      result: 0
      output: Step 1 missing
    verification:
      result: '[[ $EXIT_CODE -eq 0 ]]'
      output: grep -q 'Step 1 missing' <<< "$COMMAND_OUTPUT"
  - step: 2
    description: Execute step 2
    command: echo "Step 2 executed"
    expected:
      success: true
      result: 0
      output: Step 2 executed
    verification:
      result: '[[ $EXIT_CODE -eq 0 ]]'
      output: grep -q 'Step 2 executed' <<< "$COMMAND_OUTPUT"
  - step: 3
    description: Execute step 3
    command: echo "Step 3 executed"
    expected:
      success: true
      result: 0
      output: Step 3 executed
    verification:
      result: '[[ $EXIT_CODE -eq 0 ]]'
      output: grep -q 'Step 3 executed' <<< "$COMMAND_OUTPUT"
