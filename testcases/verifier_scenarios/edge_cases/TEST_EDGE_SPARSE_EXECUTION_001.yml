requirement: "EDGE_SPARSE_EXECUTION"
item: 1
tc: 1
id: 'TEST_EDGE_SPARSE_EXECUTION_001'
description: 'Edge case: steps 1, 3, 5 executed; 2, 4, 6 missing'

general_initial_conditions:
  system:
    - "Shell environment is available"

initial_conditions:
  system:
    - "All commands can be executed"

test_sequences:
  - id: 1
    name: "Sparse Execution Sequence"
    description: |
                   Test sequence with sparse execution pattern.
                   Odd-numbered steps (1, 3, 5) executed; even-numbered steps (2, 4, 6) missing.
    initial_conditions:
      system:
        - "Shell is ready"
    steps:
      - step: 1
        description: "Execute step 1"
        command: echo "Step 1 executed"
        expected:
          success: true
          result: 0
          output: "Step 1 executed"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q 'Step 1 executed' <<< \"$COMMAND_OUTPUT\""
      - step: 2
        description: "Missing step 2"
        command: echo "Step 2 missing"
        expected:
          success: true
          result: 0
          output: "Step 2 missing"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q 'Step 2 missing' <<< \"$COMMAND_OUTPUT\""
      - step: 3
        description: "Execute step 3"
        command: echo "Step 3 executed"
        expected:
          success: true
          result: 0
          output: "Step 3 executed"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q 'Step 3 executed' <<< \"$COMMAND_OUTPUT\""
      - step: 4
        description: "Missing step 4"
        command: echo "Step 4 missing"
        expected:
          success: true
          result: 0
          output: "Step 4 missing"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q 'Step 4 missing' <<< \"$COMMAND_OUTPUT\""
      - step: 5
        description: "Execute step 5"
        command: echo "Step 5 executed"
        expected:
          success: true
          result: 0
          output: "Step 5 executed"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q 'Step 5 executed' <<< \"$COMMAND_OUTPUT\""
      - step: 6
        description: "Missing step 6"
        command: echo "Step 6 missing"
        expected:
          success: true
          result: 0
          output: "Step 6 missing"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q 'Step 6 missing' <<< \"$COMMAND_OUTPUT\""
