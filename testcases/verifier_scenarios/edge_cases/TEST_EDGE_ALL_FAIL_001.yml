type: test_case
schema: tcms/test-case.schema.v1.json
requirement: EDGE_ALL_FAIL
item: 1
tc: 1
id: TEST_EDGE_ALL_FAIL_001
description: 'Edge case: all steps executed but all failed verification'
general_initial_conditions:
  system:
  - Shell environment is available
initial_conditions:
  system:
  - All commands can be executed
test_sequences:
- id: 1
  name: All Failures Sequence
  description: 'Test sequence where all steps are executed but fail verification.

    Each step produces incorrect output or exit code.

    '
  initial_conditions:
    system:
    - Shell is ready
  steps:
  - step: 1
    description: Step 1 fails verification
    command: echo "Wrong output 1"
    expected:
      success: true
      result: 0
      output: Expected output 1
    verification:
      result: '[[ $EXIT_CODE -eq 0 ]]'
      output: grep -q 'Expected output 1' <<< "$COMMAND_OUTPUT"
  - step: 2
    description: Step 2 fails verification
    command: echo "Wrong output 2"
    expected:
      success: true
      result: 0
      output: Expected output 2
    verification:
      result: '[[ $EXIT_CODE -eq 0 ]]'
      output: grep -q 'Expected output 2' <<< "$COMMAND_OUTPUT"
  - step: 3
    description: Step 3 fails verification
    command: echo "Wrong output 3"
    expected:
      success: true
      result: 0
      output: Expected output 3
    verification:
      result: '[[ $EXIT_CODE -eq 0 ]]'
      output: grep -q 'Expected output 3' <<< "$COMMAND_OUTPUT"
