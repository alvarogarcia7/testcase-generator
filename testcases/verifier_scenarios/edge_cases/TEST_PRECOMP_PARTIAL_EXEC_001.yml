requirement: "TEST_PRECOMP_PARTIAL_EXEC"
item: 1
tc: 1
id: 'TEST_PRECOMP_PARTIAL_EXEC_001'
description: 'Precomputed verification: partial execution with missing steps'

general_initial_conditions:
  system:
    - "Shell environment is available"

initial_conditions:
  system:
    - "All commands can be executed"

test_sequences:
  - id: 1
    name: "Partial Execution Sequence"
    description: |
                   Test sequence where some steps are executed and some are missing.
                   Steps 1 and 3 are executed, step 2 is missing.
    initial_conditions:
      system:
        - "Shell is ready"
    steps:
      - step: 1
        description: "Execute first step"
        command: echo "Step 1 executed"
        expected:
          success: true
          result: 0
          output: "Step 1 executed"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q 'Step 1 executed' <<< \"$COMMAND_OUTPUT\""
      - step: 2
        description: "Missing step - not executed"
        command: echo "Step 2 missing"
        expected:
          success: true
          result: 0
          output: "Step 2 missing"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q 'Step 2 missing' <<< \"$COMMAND_OUTPUT\""
      - step: 3
        description: "Execute third step"
        command: echo "Step 3 executed"
        expected:
          success: true
          result: 0
          output: "Step 3 executed"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q 'Step 3 executed' <<< \"$COMMAND_OUTPUT\""
