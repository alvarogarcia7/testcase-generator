requirement: "EDGE_MISSING_MIDDLE"
item: 1
tc: 1
id: 'TEST_EDGE_MISSING_MIDDLE_001'
description: 'Edge case: middle step missing with first and last present'

general_initial_conditions:
  system:
    - "Shell environment is available"

initial_conditions:
  system:
    - "All commands can be executed"

test_sequences:
  - id: 1
    name: "Missing Middle Step Sequence"
    description: |
                   Test sequence where step 2 is missing from execution log.
                   Steps 1 and 3 are present and pass verification.
    initial_conditions:
      system:
        - "Shell is ready"
    steps:
      - step: 1
        description: "Execute step 1"
        command: echo "Step 1 executed"
        expected:
          success: true
          result: 0
          output: "Step 1 executed"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q 'Step 1 executed' <<< \"$COMMAND_OUTPUT\""
      - step: 2
        description: "Missing step - never executed"
        command: echo "Step 2 missing"
        expected:
          success: true
          result: 0
          output: "Step 2 missing"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q 'Step 2 missing' <<< \"$COMMAND_OUTPUT\""
      - step: 3
        description: "Execute step 3"
        command: echo "Step 3 executed"
        expected:
          success: true
          result: 0
          output: "Step 3 executed"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q 'Step 3 executed' <<< \"$COMMAND_OUTPUT\""
