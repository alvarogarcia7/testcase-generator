requirement: "TEST_PRECOMP_ALL_FAIL"
item: 1
tc: 1
id: 'TEST_PRECOMP_ALL_FAIL_001'
description: 'Precomputed verification: all steps fail verification'

general_initial_conditions:
  system:
    - "Shell environment is available"

initial_conditions:
  system:
    - "All commands can be executed"

test_sequences:
  - id: 1
    name: "All Fail Sequence"
    description: |
                   Test sequence where all steps fail verification.
                   Every step has either result or output verification failing.
    initial_conditions:
      system:
        - "Shell is ready"
    steps:
      - step: 1
        description: "First step fails result verification"
        command: echo "Fail 1"
        expected:
          success: true
          result: 0
          output: "Fail 1"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q 'Fail 1' <<< \"$COMMAND_OUTPUT\""
      - step: 2
        description: "Second step fails output verification"
        command: echo "Fail 2"
        expected:
          success: true
          result: 0
          output: "Fail 2"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q 'Fail 2' <<< \"$COMMAND_OUTPUT\""
      - step: 3
        description: "Third step fails both verifications"
        command: echo "Fail 3"
        expected:
          success: true
          result: 0
          output: "Fail 3"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q 'Fail 3' <<< \"$COMMAND_OUTPUT\""
