requirement: "EDGE_LAST_STEP_ONLY"
item: 1
tc: 1
id: 'TEST_EDGE_LAST_STEP_ONLY_001'
description: 'Edge case: only last step executed, earlier steps missing'

general_initial_conditions:
  system:
    - "Shell environment is available"

initial_conditions:
  system:
    - "All commands can be executed"

test_sequences:
  - id: 1
    name: "Last Step Only Sequence"
    description: |
                   Test sequence where only the last step is executed.
                   Steps 1, 2, 3 are missing; step 4 is present and passes.
    initial_conditions:
      system:
        - "Shell is ready"
    steps:
      - step: 1
        description: "Missing step 1"
        command: echo "Step 1 missing"
        expected:
          success: true
          result: 0
          output: "Step 1 missing"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q 'Step 1 missing' <<< \"$COMMAND_OUTPUT\""
      - step: 2
        description: "Missing step 2"
        command: echo "Step 2 missing"
        expected:
          success: true
          result: 0
          output: "Step 2 missing"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q 'Step 2 missing' <<< \"$COMMAND_OUTPUT\""
      - step: 3
        description: "Missing step 3"
        command: echo "Step 3 missing"
        expected:
          success: true
          result: 0
          output: "Step 3 missing"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q 'Step 3 missing' <<< \"$COMMAND_OUTPUT\""
      - step: 4
        description: "Only executed step"
        command: echo "Step 4 executed"
        expected:
          success: true
          result: 0
          output: "Step 4 executed"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q 'Step 4 executed' <<< \"$COMMAND_OUTPUT\""
