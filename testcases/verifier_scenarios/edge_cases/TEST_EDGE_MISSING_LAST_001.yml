type: test_case
schema: tcms/test-case.schema.v1.json
requirement: EDGE_MISSING_LAST
item: 1
tc: 1
id: TEST_EDGE_MISSING_LAST_001
description: 'Edge case: last step missing with previous steps executed'
general_initial_conditions:
  system:
  - Shell environment is available
initial_conditions:
  system:
  - All commands can be executed
test_sequences:
- id: 1
  name: Missing Last Step Sequence
  description: 'Test sequence where step 3 is missing from execution log.

    Steps 1 and 2 are present and pass verification.

    '
  initial_conditions:
    system:
    - Shell is ready
  steps:
  - step: 1
    description: Execute step 1
    command: echo "Step 1 executed"
    expected:
      success: true
      result: 0
      output: Step 1 executed
    verification:
      result: '[[ $EXIT_CODE -eq 0 ]]'
      output: grep -q 'Step 1 executed' <<< "$COMMAND_OUTPUT"
  - step: 2
    description: Execute step 2
    command: echo "Step 2 executed"
    expected:
      success: true
      result: 0
      output: Step 2 executed
    verification:
      result: '[[ $EXIT_CODE -eq 0 ]]'
      output: grep -q 'Step 2 executed' <<< "$COMMAND_OUTPUT"
  - step: 3
    description: Missing step - never executed
    command: echo "Step 3 missing"
    expected:
      success: true
      result: 0
      output: Step 3 missing
    verification:
      result: '[[ $EXIT_CODE -eq 0 ]]'
      output: grep -q 'Step 3 missing' <<< "$COMMAND_OUTPUT"
