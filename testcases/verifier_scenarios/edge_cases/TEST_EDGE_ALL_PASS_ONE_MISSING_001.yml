requirement: "EDGE_ALL_PASS_ONE_MISSING"
item: 1
tc: 1
id: 'TEST_EDGE_ALL_PASS_ONE_MISSING_001'
description: 'Edge case: all executed steps pass but one step missing from middle'

general_initial_conditions:
  system:
    - "Shell environment is available"

initial_conditions:
  system:
    - "All commands can be executed"

test_sequences:
  - id: 1
    name: "All Pass One Missing Sequence"
    description: |
                   Test sequence where all executed steps pass verification.
                   Steps 1, 2, 4, 5 pass; step 3 is missing from execution log.
    initial_conditions:
      system:
        - "Shell is ready"
    steps:
      - step: 1
        description: "Execute and pass step 1"
        command: echo "Step 1 passed"
        expected:
          success: true
          result: 0
          output: "Step 1 passed"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q 'Step 1 passed' <<< \"$COMMAND_OUTPUT\""
      - step: 2
        description: "Execute and pass step 2"
        command: echo "Step 2 passed"
        expected:
          success: true
          result: 0
          output: "Step 2 passed"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q 'Step 2 passed' <<< \"$COMMAND_OUTPUT\""
      - step: 3
        description: "Missing step 3"
        command: echo "Step 3 missing"
        expected:
          success: true
          result: 0
          output: "Step 3 missing"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q 'Step 3 missing' <<< \"$COMMAND_OUTPUT\""
      - step: 4
        description: "Execute and pass step 4"
        command: echo "Step 4 passed"
        expected:
          success: true
          result: 0
          output: "Step 4 passed"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q 'Step 4 passed' <<< \"$COMMAND_OUTPUT\""
      - step: 5
        description: "Execute and pass step 5"
        command: echo "Step 5 passed"
        expected:
          success: true
          result: 0
          output: "Step 5 passed"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q 'Step 5 passed' <<< \"$COMMAND_OUTPUT\""
