type: test_case
schema: tcms/test-case.schema.v1.json
requirement: FAILED_FIRST_STEP
item: 1
tc: 1
id: TEST_FAILED_FIRST_001
description: Test case demonstrating failed first step scenario where step 1 fails
  and remaining steps are not executed
general_initial_conditions:
  system:
  - Shell environment is available
initial_conditions:
  system:
  - All commands can be executed
test_sequences:
- id: 1
  name: Failed First Step Sequence
  description: 'This test sequence demonstrates a scenario where the first step fails.

    Step 1 expects exit code 0 but receives exit code 1.

    Steps 2-4 are not executed as a result.

    '
  initial_conditions:
    system:
    - Shell is ready
  steps:
  - step: 1
    description: Attempt to create directory (fails)
    command: mkdir /invalid/path/directory
    expected:
      success: true
      result: 0
      output: ''
    verification:
      result: '[[ $EXIT_CODE -eq 0 ]]'
      output: 'true'
  - step: 2
    description: Create a file (not executed)
    command: echo "test content" > /tmp/test_file.txt
    expected:
      success: true
      result: 0
      output: ''
    verification:
      result: '[[ $EXIT_CODE -eq 0 ]]'
      output: 'true'
  - step: 3
    description: Read the file (not executed)
    command: cat /tmp/test_file.txt
    expected:
      success: true
      result: 0
      output: test content
    verification:
      result: '[[ $EXIT_CODE -eq 0 ]]'
      output: grep -q 'test content' <<< "$COMMAND_OUTPUT"
  - step: 4
    description: Clean up the file (not executed)
    command: rm /tmp/test_file.txt
    expected:
      success: true
      result: 0
      output: ''
    verification:
      result: '[[ $EXIT_CODE -eq 0 ]]'
      output: 'true'
