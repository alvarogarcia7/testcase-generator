type: test_case
schema: tcms/test-case.schema.v1.json
requirement: TEST_PRECOMP_TWO_FAILURES
item: 1
tc: 1
id: TEST_PRECOMP_TWO_FAILURES_001
description: 'Precomputed verification: two steps fail in different ways'
general_initial_conditions:
  system:
  - Shell environment is available
initial_conditions:
  system:
  - All commands can be executed
test_sequences:
- id: 1
  name: Two Failures Sequence
  description: 'Test sequence where two steps fail verification in different ways.

    Step 2 fails result, step 4 fails output.

    '
  initial_conditions:
    system:
    - Shell is ready
  steps:
  - step: 1
    description: First step passes
    command: echo "Pass 1"
    expected:
      success: true
      result: 0
      output: Pass 1
    verification:
      result: '[[ $EXIT_CODE -eq 0 ]]'
      output: grep -q 'Pass 1' <<< "$COMMAND_OUTPUT"
  - step: 2
    description: Second step fails result verification
    command: exit 1
    expected:
      success: false
      result: 1
      output: ''
    verification:
      result: '[[ $EXIT_CODE -eq 1 ]]'
      output: 'true'
  - step: 3
    description: Third step passes
    command: echo "Pass 3"
    expected:
      success: true
      result: 0
      output: Pass 3
    verification:
      result: '[[ $EXIT_CODE -eq 0 ]]'
      output: grep -q 'Pass 3' <<< "$COMMAND_OUTPUT"
  - step: 4
    description: Fourth step fails output verification
    command: echo "Different output"
    expected:
      success: true
      result: 0
      output: Expected output
    verification:
      result: '[[ $EXIT_CODE -eq 0 ]]'
      output: grep -q 'Expected output' <<< "$COMMAND_OUTPUT"
