type: test_case
schema: tcms/test-case.schema.v1.json
requirement: SAMPLE_TEST_001
item: 1
tc: 1
id: SAMPLE_TEST_001
description: Sample test case for manual audit-verifier testing
general_initial_conditions:
  system:
  - Shell environment is available
initial_conditions:
  system:
  - Commands can be executed
test_sequences:
- id: 1
  name: Basic Commands
  description: Simple test sequence with echo commands
  initial_conditions:
    system:
    - Shell is ready
  steps:
  - step: 1
    description: Echo hello
    command: echo "hello"
    expected:
      success: true
      result: 0
      output: hello
    verification:
      result: '[[ $EXIT_CODE -eq 0 ]]'
      output: grep -q 'hello' <<< "$COMMAND_OUTPUT"
  - step: 2
    description: Echo world
    command: echo "world"
    expected:
      success: true
      result: 0
      output: world
    verification:
      result: '[[ $EXIT_CODE -eq 0 ]]'
      output: grep -q 'world' <<< "$COMMAND_OUTPUT"
  - step: 3
    description: Run true command
    command: true
    expected:
      success: true
      result: 0
      output: ''
    verification:
      result: '[[ $EXIT_CODE -eq 0 ]]'
      output: 'true'
