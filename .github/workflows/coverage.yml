name: Coverage

on:
  push:
    branches: [ main, 'feature/**', 'f69c-*' ]
  pull_request:
    branches: [ main, 'feature/**', 'f69c-*' ]
  workflow_dispatch:

jobs:
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable
        components: llvm-tools-preview
        
    - name: Install cargo-llvm-cov
      uses: taiki-e/install-action@v2
      with:
        tool: cargo-llvm-cov

    - name: Install Expect
      run: sudo apt-get update && sudo apt-get install -y expect
      
    - name: Build project
      run: cargo build --all

    - name: Run coverage with minimum threshold
      run: |
        mkdir -p target/llvm-cov
        cargo llvm-cov --all-features --workspace --ignore-filename-regex '(fuzzy\.rs|prompts\.rs|main_editor\.rs)' --fail-under-lines 63 --lcov --output-path target/llvm-cov/lcov.info
      
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: target/llvm-cov/lcov.info
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}
        
        
          
    - name: Upload coverage artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: target/llvm-cov/
        retention-days: 30
