name: CI

on:
  push:
    branches: [ "master", "main", "feature/**", "f69c-*" ]
  pull_request:
    branches: [ "master", "main", "feature/**", "f69c-*" ]
  workflow_dispatch:

env:
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: "-Dwarnings"
  RUSTDOCFLAGS: "-Dwarnings"

jobs:
  ci:
    name: Build, Test, Lint & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: RustCrypto/actions/cargo-cache@master

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: clippy,rustfmt,llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y expect

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Build
        run: cargo build --all --all-features

      - name: Clippy lint
        run: cargo clippy --all --all-features --tests -- -D warnings

      - name: Run tests
        run: cargo test --all --all-features --tests

      - name: Generate documentation
        run: cargo doc --all-features --no-deps

      - name: Run coverage
        run: |
          mkdir -p target/llvm-cov
          cargo llvm-cov --all-features --workspace --ignore-filename-regex '(fuzzy\.rs|prompts\.rs|main_editor\.rs)' --fail-under-lines 63 --lcov --output-path target/llvm-cov/lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: target/llvm-cov/lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: target/llvm-cov/
          retention-days: 30

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Run E2E tests
        run: make test-e2e
