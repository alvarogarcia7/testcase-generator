name: CI

on:
  push:
    branches: [ "master", "main", "feature/**", "f69c-*" ]
  pull_request:
    branches: [ "master", "main", "feature/**", "f69c-*" ]
  workflow_dispatch:

env:
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: "-Dwarnings"
  RUSTDOCFLAGS: "-Dwarnings"
  # Python 3.14 is managed via uv package manager
  # All Python scripts should be run with: uv run python3.14 script.py

jobs:
  ci:
    name: Build, Test, Lint & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: RustCrypto/actions/cargo-cache@master

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: clippy,rustfmt,llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y expect jq

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Cache uv and Python
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/uv
            ~/.local/share/uv
            .venv
          key: ${{ runner.os }}-uv-${{ hashFiles('**/pyproject.toml', '**/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Setup Python 3.14 with uv
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          uv python install 3.14
          uv sync --python 3.14

      - name: Detect changed crates
        id: detect-changes
        run: |
          # On main/master branch or workflow_dispatch, build everything
          if [[ "${{ github.ref }}" == "refs/heads/main" ]] || [[ "${{ github.ref }}" == "refs/heads/master" ]] || [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "Building all crates (main/master branch or manual trigger)"
            echo "AFFECTED_CRATES=" >> $GITHUB_ENV
            echo "BUILD_ALL=true" >> $GITHUB_ENV
          else
            # Detect changes for feature branches and pull requests
            if [[ "${{ github.event_name }}" == "pull_request" ]]; then
              export CI_MERGE_REQUEST_DIFF_BASE_SHA="${{ github.event.pull_request.base.sha }}"
              export CI_COMMIT_SHA="${{ github.event.pull_request.head.sha }}"
            else
              # For push events on feature branches
              export CI_MERGE_REQUEST_DIFF_BASE_SHA="${{ github.event.before }}"
              export CI_COMMIT_SHA="${{ github.sha }}"
            fi
            
            chmod +x scripts/ci-detect-changes.sh
            AFFECTED_CRATES=$(scripts/ci-detect-changes.sh)
            
            if [[ -z "$AFFECTED_CRATES" ]]; then
              echo "No affected crates detected"
              echo "AFFECTED_CRATES=" >> $GITHUB_ENV
              echo "BUILD_ALL=false" >> $GITHUB_ENV
            else
              echo "Affected crates: $AFFECTED_CRATES"
              echo "AFFECTED_CRATES=$AFFECTED_CRATES" >> $GITHUB_ENV
              echo "BUILD_ALL=false" >> $GITHUB_ENV
            fi
          fi

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Build
        run: |
          if [[ "${{ env.BUILD_ALL }}" == "true" ]]; then
            echo "Building all crates"
            cargo build --all --all-features
          elif [[ -z "${{ env.AFFECTED_CRATES }}" ]]; then
            echo "No crates to build (no changes detected)"
          else
            echo "Building affected crates: ${{ env.AFFECTED_CRATES }}"
            for crate in ${{ env.AFFECTED_CRATES }}; do
              echo "Building crate: $crate"
              cargo build -p "$crate" --all-features
            done
          fi

      - name: Clippy lint
        run: |
          if [[ "${{ env.BUILD_ALL }}" == "true" ]]; then
            echo "Running clippy on all crates"
            cargo clippy --all --all-features --tests -- -D warnings
          elif [[ -z "${{ env.AFFECTED_CRATES }}" ]]; then
            echo "No crates to lint (no changes detected)"
          else
            echo "Running clippy on affected crates: ${{ env.AFFECTED_CRATES }}"
            for crate in ${{ env.AFFECTED_CRATES }}; do
              echo "Linting crate: $crate"
              cargo clippy -p "$crate" --all-features --tests -- -D warnings
            done
          fi

      - name: Run tests
        run: |
          if [[ "${{ env.BUILD_ALL }}" == "true" ]]; then
            echo "Running tests on all crates"
            cargo test --all --all-features --tests
          elif [[ -z "${{ env.AFFECTED_CRATES }}" ]]; then
            echo "No crates to test (no changes detected)"
          else
            echo "Running tests on affected crates: ${{ env.AFFECTED_CRATES }}"
            for crate in ${{ env.AFFECTED_CRATES }}; do
              echo "Testing crate: $crate"
              cargo test -p "$crate" --all-features --tests
            done
          fi

      - name: Generate documentation
        run: cargo doc --all-features --no-deps

