site_name: Test Case Manager
site_description: A comprehensive CLI tool for managing test cases in YAML format with interactive workflows, fuzzy search, git integration, and test verification capabilities
site_author: Test Case Manager Team
repo_url: https://github.com/testcase-manager/testcase-manager

theme:
  name: material
  palette:
    # Palette toggle for light mode
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - navigation.tracking
    - search.suggest
    - search.highlight
    - search.share
    - toc.follow
    - toc.integrate
    - content.code.copy
    - content.code.annotate

nav:
  - Home: index.md
  - Getting Started:
      - Overview: getting-started/index.md
      - Prerequisites: getting-started/prerequisites.md
      - Installation: README_INSTALL.md
      - Docker Setup: getting-started/docker.md
      - Docker MkDocs Setup: DOCKER_MKDOCS.md
      - Docker MkDocs Quick Ref: DOCKER_MKDOCS_QUICK_REF.md
  - User Guide:
      - Overview: user-guide/README.md
      - Interactive Workflow: user-guide/interactive-workflow.md
      - Validation Guide: user-guide/validation.md
  - CLI Tools:
      - Overview: cli-tools/README.md
      - Test Case Manager: README.md
      - Test Verify: cli-tools/test-verify-usage.md
      - Test Verify Quick Reference: cli-tools/test-verify-quick-reference.md
      - Test Verify Workflow: cli-tools/test-verify-workflow.md
      - Validate YAML: cli-tools/validate-yaml.md
      - JSON Escaping Config: cli-tools/json-escaping-config.md
  - Features:
      - Overview: features/README.md
      - BDD Initial Conditions: features/bdd-initial-conditions.md
      - Variables & Data Passing: features/variable-passing.md
      - Variable Capture Command: features/variables-capture-command.md
      - Environment Variable Hydration: features/environment-variable-hydration.md
      - Conditional Verification: features/conditional-verification.md
      - Verification Templates: features/verification-templates.md
      - Manual Steps Handling: features/manual-steps-handling.md
      - Manual Step Filtering: features/manual-step-filtering.md
      - Watch Mode Comparison: features/watch-mode-comparison.md
      - Recovery Mechanism: features/recovery.md
      - TTY Fallback: features/tty-fallback.md
  - Development:
      - Overview: development/README.md
      - Interactive Implementation: development/interactive-implementation.md
      - Coverage: development/coverage.md
      - GitLab CI Setup: development/gitlab-ci-setup.md
      - GitLab CI Examples: development/gitlab-ci-examples.md
  - Examples:
      - JUnit Export: features/junit-export.md
      - JUnit XML XSD Validation: features/junit-xml-xsd-validation.md

markdown_extensions:
  # Code highlighting
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  
  # Admonitions (notes, warnings, etc.)
  - admonition
  - pymdownx.details
  
  # Tables
  - tables
  
  # Table of contents
  - toc:
      permalink: true
      toc_depth: 3
  
  # Additional useful extensions
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.keys
  - pymdownx.smartsymbols
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - abbr

plugins:
  - search:
      lang: en
      separator: '[\s\-\.]+'
  - with-pdf:
      enabled_if_env: ENABLE_PDF_EXPORT
      author: Test Case Manager Team
      copyright: Copyright © 2024 Test Case Manager Team
      output_path: pdf/testcase-manager-documentation.pdf
      cover_title: Test Case Manager Documentation
      cover_subtitle: A comprehensive CLI tool for managing test cases in YAML format with interactive workflows, fuzzy search, git integration, and test verification capabilities
      toc_title: Table of Contents
      heading_shift: false
      toc_level: 3
      ordered_chapter_level: 2
      excludes_children:
        - 'IMPLEMENTATION_*.md'
        - '*_SUMMARY.md'
      exclude_pages:
        - 'IMPLEMENTATION_COMPLETE_DOCS_RESTRUCTURE.md'
        - 'tests/integration/IMPLEMENTATION_SUMMARY.md'
        - 'testcases/examples/variables/IMPLEMENTATION_NOTES.md'
        - 'IMPLEMENTATION_XSD_VALIDATION.md'
        - 'IMPLEMENTATION_WATCH_MODE.md'
        - 'IMPLEMENTATION_VALIDATE_SUBCOMMAND.md'
        - 'IMPLEMENTATION_TTY_FALLBACK.md'
        - 'IMPLEMENTATION_TEST_VERIFY.md'
        - 'IMPLEMENTATION_TEST_EXECUTOR_E2E.md'
        - 'IMPLEMENTATION_SUMMARY_STEP_COLLECTION.md'
        - 'IMPLEMENTATION_SUMMARY_SEQUENCE_BUILDER.md'
        - 'IMPLEMENTATION_SUMMARY_INTERACTIVE.md'
        - 'IMPLEMENTATION_SUMMARY_INITIAL_CONDITIONS.md'
        - 'IMPLEMENTATION_SUMMARY_CONDITIONS.md'
        - 'IMPLEMENTATION_SUMMARY.md'
        - 'IMPLEMENTATION_SHARED_BINARY_LIBRARY.md'
        - 'IMPLEMENTATION_RECURSIVE_VALIDATION.md'
        - 'IMPLEMENTATION_RECOVERY.md'
        - 'IMPLEMENTATION_PROMPTS_DB_INJECTION.md'
        - 'IMPLEMENTATION_JUNIT_XML.md'
        - 'IMPLEMENTATION_JSON_ESCAPE_E2E.md'
        - 'IMPLEMENTATION_EXAMPLE_SCRIPTS.md'
        - 'IMPLEMENTATION_DEVICE_NAME_FUZZY_SEARCH.md'
        - 'IMPLEMENTATION_DETAILED_VALIDATION.md'
        - 'IMPLEMENTATION_COVERAGE_TOOLS_ENHANCED.md'
        - 'IMPLEMENTATION_CONDITIONS_MANAGER.md'
        - 'IMPLEMENTATION_COMPLETE.md'
        - 'IMPLEMENTATION_CHUNK_VALIDATION.md'
        - 'DOCUMENTATION_RESTRUCTURE_SUMMARY.md'
        - 'tests/integration/VALIDATE_FILES_IMPLEMENTATION_SUMMARY.md'
        - 'VALIDATION_FIX_SUMMARY.md'
        - 'MANUAL_STEPS_EXECUTION_SUMMARY.md'
        - 'DOCUMENTATION_SUMMARY.md'
        - 'DOCKER_CLEANUP_SUMMARY.md'
        - 'CROSS_PLATFORM_TESTS_SUMMARY.md'
      custom_template_path: TEMPLATES
      cover_logo: null
      cover: true
      back_cover: true
      cover_subtitle_color: '#6c757d'
      custom_css: docs/stylesheets/pdf.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/testcase-manager/testcase-manager
  version:
    provider: mike
