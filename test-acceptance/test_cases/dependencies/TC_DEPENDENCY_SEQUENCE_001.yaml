requirement: "DEPENDENCY_SEQUENCE"
item: 1
tc: 1
id: 'TC_DEPENDENCY_SEQUENCE_001'
description: 'Sequence-level dependency test - test sequences have dependencies on other test case sequences'

general_initial_conditions:
  system:
    - "Bash shell is available"
    - "File system operations are supported"

initial_conditions:
  filesystem:
    - "Temporary directory /tmp is writable"

test_sequences:
  - id: 1
    name: "Independent Sequence"
    description: "Sequence with no dependencies"
    initial_conditions:
      system:
        - "No dependencies required"
    steps:
      - step: 1
        description: "Create base data"
        command: "echo 'Base data created' > /tmp/base_data_dep_seq.txt"
        expected:
          success: true
          result: '0'
          output: ""
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "true"

      - step: 2
        description: "Verify base data"
        command: "cat /tmp/base_data_dep_seq.txt"
        expected:
          success: true
          result: '0'
          output: "Base data created"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q 'Base data created' <<< \"$COMMAND_OUTPUT\""

  - id: 2
    name: "Dependent Sequence - References TC_SUCCESS_MULTI_SEQ_001"
    description: "Sequence that has dependency on another test case's sequence"
    initial_conditions:
      include:
        - id: 'TC_SUCCESS_MULTI_SEQ_001'
          test_sequence: '1'
      filesystem:
        - "Dependency on TC_SUCCESS_MULTI_SEQ_001 sequence 1"
      system:
        - "Dependencies from TC_SUCCESS_MULTI_SEQ_001 sequence 1 must be satisfied"
    steps:
      - step: 1
        description: "Process dependent data"
        command: "echo 'Processing with dependency on TC_SUCCESS_MULTI_SEQ_001 seq 1'"
        expected:
          success: true
          result: '0'
          output: "Processing"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q 'Processing' <<< \"$COMMAND_OUTPUT\""

      - step: 2
        description: "Cleanup base data"
        command: "rm -f /tmp/base_data_dep_seq.txt && echo 'Cleaned'"
        expected:
          success: true
          result: '0'
          output: "Cleaned"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q 'Cleaned' <<< \"$COMMAND_OUTPUT\""

  - id: 3
    name: "Multiple Sequence Dependencies"
    description: "Sequence that has dependencies on multiple test sequences"
    initial_conditions:
      include:
        - id: 'TC_SUCCESS_MULTI_SEQ_001'
          test_sequence: '1'
        - id: 'TC_SUCCESS_MULTI_SEQ_001'
          test_sequence: '2'
        - id: 'TC_SUCCESS_VAR_CAPTURE_001'
          test_sequence: '1'
      system:
        - "Dependencies on multiple test sequences"
        - "TC_SUCCESS_MULTI_SEQ_001 sequences 1 and 2"
        - "TC_SUCCESS_VAR_CAPTURE_001 sequence 1"
        - "All sequence dependencies must be satisfied"
    steps:
      - step: 1
        description: "Execute with multiple dependencies"
        command: "echo 'All dependencies: 3 sequences'"
        expected:
          success: true
          result: '0'
          output: "All dependencies"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q 'All dependencies' <<< \"$COMMAND_OUTPUT\""
