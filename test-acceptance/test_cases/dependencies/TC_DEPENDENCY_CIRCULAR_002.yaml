requirement: "DEPENDENCY_CIRCULAR"
item: 1
tc: 2
id: 'TC_DEPENDENCY_CIRCULAR_002'
description: 'Circular dependency companion test - creates circular reference by including TC_DEPENDENCY_CIRCULAR_001'

general_initial_conditions:
  system:
    - "Bash shell is available"
    - "Part of circular dependency test scenario"

initial_conditions:
  include:
    - id: 'TC_DEPENDENCY_CIRCULAR_001'
  filesystem:
    - "Temporary directory /tmp is writable"
  system:
    - "This test completes the circular dependency"
    - "TC_DEPENDENCY_CIRCULAR_002 -> TC_DEPENDENCY_CIRCULAR_001 -> TC_DEPENDENCY_CIRCULAR_002 (CIRCULAR!)"

test_sequences:
  - id: 1
    name: "Circular Dependency Companion"
    description: "This test includes TC_DEPENDENCY_CIRCULAR_001, creating a circular dependency"
    initial_conditions:
      system:
        - "Circular dependency should be detected"
    steps:
      - step: 1
        description: "Attempt to execute with circular dependency"
        command: "echo 'This should not execute due to circular dependency'"
        expected:
          success: false
          result: 1
          output: "Circular dependency detected"
        verification:
          result: "[[ $EXIT_CODE -ne 0 ]]"
          output: "grep -q 'Circular dependency' <<< \"$COMMAND_OUTPUT\" || true"
