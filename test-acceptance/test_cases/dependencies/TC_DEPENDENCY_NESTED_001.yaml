requirement: "DEPENDENCY_NESTED"
item: 1
tc: 1
id: 'TC_DEPENDENCY_NESTED_001'
description: 'Nested dependency test - demonstrates transitive dependency documentation (A depends on B, B depends on C)'

general_initial_conditions:
  system:
    - "Bash shell is available"
    - "NOTE: Dependency chain documented - TC_DEPENDENCY_NESTED_001 -> TC_DEPENDENCY_SIMPLE_001 -> TC_SUCCESS_SIMPLE_001"

initial_conditions:
  filesystem:
    - "Temporary directory /tmp is writable"
  system:
    - "DEPENDENCY: TC_DEPENDENCY_SIMPLE_001 (documented but not enforced)"
    - "Transitive dependencies: TC_SUCCESS_SIMPLE_001 (through TC_DEPENDENCY_SIMPLE_001)"

test_sequences:
  - id: 1
    name: "First Level Dependency"
    description: "Direct dependency on another dependent test"
    initial_conditions:
      system:
        - "First level dependencies documented"
    steps:
      - step: 1
        description: "Verify nested dependency chain documentation"
        command: "echo 'Nested dependency: TC_DEPENDENCY_NESTED_001 -> TC_DEPENDENCY_SIMPLE_001 -> TC_SUCCESS_SIMPLE_001'"
        expected:
          success: true
          result: 0
          output: "Nested dependency"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q 'Nested dependency' <<< \"$COMMAND_OUTPUT\""

      - step: 2
        description: "Execute with nested dependencies"
        command: "echo 'All nested dependencies documented' && echo 'Depth: 3 levels'"
        expected:
          success: true
          result: 0
          output: "All nested dependencies documented"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q 'All nested dependencies documented' <<< \"$COMMAND_OUTPUT\" && grep -q 'Depth: 3 levels' <<< \"$COMMAND_OUTPUT\""

  - id: 2
    name: "Second Level Dependency"
    description: "Sequence with additional nested dependencies"
    initial_conditions:
      system:
        - "DEPENDENCY: TC_DEPENDENCY_SEQUENCE_001 sequence 2 (documented)"
        - "Second level dependencies documented"
        - "Transitive closure includes TC_SUCCESS_MULTI_SEQ_001"
    steps:
      - step: 1
        description: "Verify multi-level dependency documentation"
        command: "echo 'Multi-level dependency graph documented'"
        expected:
          success: true
          result: 0
          output: "Multi-level dependency graph documented"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q 'Multi-level dependency graph documented' <<< \"$COMMAND_OUTPUT\""

      - step: 2
        description: "Complete nested test execution"
        command: "echo 'Nested test execution complete'"
        expected:
          success: true
          result: 0
          output: "Nested test execution complete"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q 'Nested test execution complete' <<< \"$COMMAND_OUTPUT\""

  - id: 3
    name: "Complex Nested Dependencies"
    description: "Sequence with complex nested dependency documentation"
    initial_conditions:
      system:
        - "DEPENDENCY: TC_DEPENDENCY_SIMPLE_001 (documented)"
        - "DEPENDENCY: TC_DEPENDENCY_SEQUENCE_001 sequence 1 (documented)"
        - "DEPENDENCY: TC_SUCCESS_VAR_CAPTURE_001 (documented)"
        - "Complex dependency graph documented"
    steps:
      - step: 1
        description: "Execute with complex nested dependencies"
        command: "echo 'Complex nested dependencies: 6+ transitive dependencies documented'"
        expected:
          success: true
          result: 0
          output: "Complex nested dependencies"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q 'Complex nested dependencies' <<< \"$COMMAND_OUTPUT\""
