requirement: "DEPENDENCY_COMPLEX"
item: 1
tc: 1
id: 'TC_DEPENDENCY_COMPLEX_001'
description: 'Complex dependency scenario - demonstrates multiple dependencies at both test case and sequence levels with mixed resolution'

general_initial_conditions:
  system:
    - "Bash shell is available"
    - "Complex dependency resolution is supported"

initial_conditions:
  include:
    - id: 'TC_SUCCESS_SIMPLE_001'
    - id: 'TC_SUCCESS_VAR_CAPTURE_001'
  filesystem:
    - "Temporary directory /tmp is writable"
  system:
    - "Multiple test case dependencies at root level"

test_sequences:
  - id: 1
    name: "Root Level Dependencies Only"
    description: "Sequence inherits only root-level dependencies"
    initial_conditions:
      system:
        - "Inherits TC_SUCCESS_SIMPLE_001 and TC_SUCCESS_VAR_CAPTURE_001"
    steps:
      - step: 1
        description: "Execute with inherited dependencies"
        command: "echo 'Using root-level dependencies'"
        expected:
          success: true
          result: 0
          output: "Using root-level dependencies"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q 'Using root-level dependencies' <<< \"$COMMAND_OUTPUT\""

  - id: 2
    name: "Combined Root and Sequence Dependencies"
    description: "Sequence with both inherited and additional dependencies"
    initial_conditions:
      include:
        - id: 'TC_SUCCESS_MULTI_SEQ_001'
          test_sequence: '1'
        - id: 'TC_SUCCESS_MULTI_SEQ_001'
          test_sequence: '2'
      system:
        - "Inherits root dependencies plus sequence-specific ones"
        - "Total dependencies: TC_SUCCESS_SIMPLE_001, TC_SUCCESS_VAR_CAPTURE_001, TC_SUCCESS_MULTI_SEQ_001 seq 1, TC_SUCCESS_MULTI_SEQ_001 seq 2"
    steps:
      - step: 1
        description: "Execute with combined dependencies"
        command: "echo 'Combined: 2 root + 2 sequence = 4 dependencies'"
        expected:
          success: true
          result: 0
          output: "Combined"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q 'Combined' <<< \"$COMMAND_OUTPUT\""

      - step: 2
        description: "Verify dependency resolution order"
        command: "echo 'Resolution: Root deps resolved first, then sequence deps'"
        expected:
          success: true
          result: 0
          output: "Resolution"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q 'Resolution' <<< \"$COMMAND_OUTPUT\""

  - id: 3
    name: "Sequence Override Dependencies"
    description: "Sequence with dependencies that may override or extend root dependencies"
    initial_conditions:
      include:
        - id: 'TC_SUCCESS_SIMPLE_001'
        - id: 'TC_DEPENDENCY_SIMPLE_001'
        - id: 'TC_SUCCESS_ENV_VARS_001'
      system:
        - "Sequence-level includes may duplicate root includes"
        - "Dependency resolution should deduplicate"
    steps:
      - step: 1
        description: "Execute with potentially duplicate dependencies"
        command: "echo 'Deduplication test: TC_SUCCESS_SIMPLE_001 appears in both root and sequence'"
        expected:
          success: true
          result: 0
          output: "Deduplication test"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q 'Deduplication test' <<< \"$COMMAND_OUTPUT\""

      - step: 2
        description: "Verify dependency count after deduplication"
        command: "echo 'Unique dependencies should be resolved once'"
        expected:
          success: true
          result: 0
          output: "Unique dependencies"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q 'Unique dependencies' <<< \"$COMMAND_OUTPUT\""

  - id: 4
    name: "Transitive Dependency Resolution"
    description: "Sequence with dependencies that have their own dependencies"
    initial_conditions:
      include:
        - id: 'TC_DEPENDENCY_NESTED_001'
          test_sequence: '1'
      system:
        - "Transitive dependencies should be resolved"
        - "TC_DEPENDENCY_NESTED_001 -> TC_DEPENDENCY_SIMPLE_001 -> TC_SUCCESS_SIMPLE_001"
    steps:
      - step: 1
        description: "Execute with transitive dependencies"
        command: "echo 'Transitive closure computed for all dependencies'"
        expected:
          success: true
          result: 0
          output: "Transitive closure"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q 'Transitive closure' <<< \"$COMMAND_OUTPUT\""

      - step: 2
        description: "Verify full dependency graph"
        command: "echo 'Full graph includes root + sequence + transitive dependencies'"
        expected:
          success: true
          result: 0
          output: "Full graph"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q 'Full graph' <<< \"$COMMAND_OUTPUT\""
