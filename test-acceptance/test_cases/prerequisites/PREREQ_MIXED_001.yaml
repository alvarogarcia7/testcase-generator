type: test_case
schema: tcms/test-case.schema.v1.json
requirement: PREREQ_MIXED
item: 1
tc: 1
id: PREREQ_MIXED_001
description: Test case with mixed automatic and manual prerequisites
prerequisites:
- type: manual
  description: Ensure you are logged in with appropriate user privileges
- type: automatic
  description: Check that /tmp directory is available
  verification_command: test -d /tmp
- type: manual
  description: Verify that you have reviewed the test plan documentation
- type: automatic
  description: Confirm date command is available
  verification_command: which date > /dev/null 2>&1
- type: automatic
  description: Verify grep command is available
  verification_command: which grep > /dev/null 2>&1
- type: manual
  description: Confirm that test execution logs are being captured
general_initial_conditions:
  system:
  - Shell environment is available
  - User has confirmed manual prerequisites
  - Automatic prerequisites have been verified
initial_conditions:
  system:
  - All prerequisites (manual and automatic) have passed
test_sequences:
- id: 1
  name: Mixed Prerequisites Test Sequence
  description: 'This test sequence executes after both manual user confirmations

    and automatic verification checks have completed successfully.

    '
  initial_conditions:
    system:
    - Environment is fully validated
  steps:
  - step: 1
    description: Display current timestamp
    command: date +%Y-%m-%d
    expected:
      success: true
      result: 0
      output: '-'
    verification:
      result: '[[ $EXIT_CODE -eq 0 ]]'
      output: grep -qE '[0-9]{4}-[0-9]{2}-[0-9]{2}' <<< "$COMMAND_OUTPUT"
  - step: 2
    description: Create and verify test file
    command: echo "mixed prerequisites test" > /tmp/mixed_prereq_test.txt && cat /tmp/mixed_prereq_test.txt
    expected:
      success: true
      result: 0
      output: mixed prerequisites test
    verification:
      result: '[[ $EXIT_CODE -eq 0 ]]'
      output: grep -q 'mixed prerequisites test' <<< "$COMMAND_OUTPUT"
  - step: 3
    description: Search test file for content
    command: grep "prerequisites" /tmp/mixed_prereq_test.txt
    expected:
      success: true
      result: 0
      output: prerequisites
    verification:
      result: '[[ $EXIT_CODE -eq 0 ]]'
      output: grep -q 'prerequisites' <<< "$COMMAND_OUTPUT"
  - step: 4
    description: Clean up test file
    command: rm -f /tmp/mixed_prereq_test.txt
    expected:
      success: true
      result: 0
      output: ''
    verification:
      result: '[[ $EXIT_CODE -eq 0 ]]'
      output: 'true'
- id: 2
  name: Verification Sequence
  description: 'Second sequence to verify that prerequisites only check once

    at the beginning, not between sequences.

    '
  initial_conditions:
    system:
    - First sequence completed successfully
  steps:
  - step: 1
    description: Confirm prerequisites were checked at start
    command: echo "Prerequisites checked before first sequence only"
    expected:
      success: true
      result: 0
      output: Prerequisites checked before first sequence only
    verification:
      result: '[[ $EXIT_CODE -eq 0 ]]'
      output: grep -q 'Prerequisites checked' <<< "$COMMAND_OUTPUT"
