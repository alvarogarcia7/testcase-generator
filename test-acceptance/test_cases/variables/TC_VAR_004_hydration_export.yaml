requirement: "VAR_TEST"
item: 1
tc: 4
id: 'TC_VAR_004'
description: 'Test variable hydration from export file with environment variables'

general_initial_conditions:
  system:
    - "Bash shell is available"
    - "Environment variables can be set"

initial_conditions:
  environment:
    - "Test execution environment is ready"
    - "Hydration variables are provided"

hydration_vars:
  TEST_API_URL:
    name: "TEST_API_URL"
    description: "API endpoint URL for testing"
    default_value: "https://api.example.com"
    required: true
  
  TEST_API_KEY:
    name: "TEST_API_KEY"
    description: "API authentication key"
    default_value: "default_test_key_12345"
    required: true
  
  TEST_TIMEOUT:
    name: "TEST_TIMEOUT"
    description: "Request timeout in seconds"
    default_value: "30"
    required: true

test_sequences:
  - id: 1
    name: "Hydration Variable Usage"
    description: "Use hydrated variables from export file in test commands"
    initial_conditions:
      system:
        - "Hydration variables are available in environment"
    steps:
      - step: 1
        description: "Verify hydration variables are set"
        command: |
          echo "API URL: ${#TEST_API_URL}"
          echo "API Key: ${#TEST_API_KEY}"
          echo "Timeout: ${#TEST_TIMEOUT}"
        expected:
          success: true
          result: '0'
          output: 'API URL'
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q 'API URL' <<< \"$COMMAND_OUTPUT\""

      - step: 2
        description: "Use hydrated variables in mock API call"
        command: |
          echo "Calling ${#TEST_API_URL} with key ${#TEST_API_KEY}"
          echo "Timeout set to ${#TEST_TIMEOUT} seconds"
        capture_vars:
          - name: configured_timeout
            capture: 'Timeout set to ([0-9]+)'
        expected:
          success: true
          result: '0'
          output: 'Calling'
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q 'Calling' <<< \"$COMMAND_OUTPUT\""
          general:
            - name: verify_timeout_captured
              condition: "[[ -n \"$configured_timeout\" ]]"
            - name: verify_timeout_numeric
              condition: "[[ $configured_timeout =~ ^[0-9]+$ ]]"
