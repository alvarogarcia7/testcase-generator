requirement: "VAR_TEST"
item: 1
tc: 3
id: 'TC_VAR_003'
description: 'Test using captured variable in subsequent step commands'

general_initial_conditions:
  system:
    - "Bash shell is available"
    - "Standard Unix utilities are available"

initial_conditions:
  environment:
    - "Test execution environment is ready"

test_sequences:
  - id: 1
    name: "Variable Usage in Subsequent Steps"
    description: "Capture a variable in one step and use it in following steps"
    initial_conditions:
      system:
        - "Variable capture and substitution are working"
    steps:
      - step: 1
        description: "Capture session ID from login simulation"
        command: |
          echo "Session created: SESSION_abc123xyz789"
        capture_vars:
          - name: session_id
            capture: 'Session created: (SESSION_[a-z0-9]+)'
        expected:
          success: true
          result: '0'
          output: 'Session created'
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q 'Session created' <<< \"$COMMAND_OUTPUT\""
          general:
            - name: verify_session_id_captured
              condition: "[[ -n \"$session_id\" ]]"
            - name: verify_session_id_format
              condition: "[[ $session_id =~ ^SESSION_[a-z0-9]+$ ]]"

      - step: 2
        description: "Use captured session ID to make authenticated request"
        command: |
          echo "Authenticating with session: $session_id"
        expected:
          success: true
          result: '0'
          output: 'SESSION_abc123xyz789'
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q '$session_id' <<< \"$COMMAND_OUTPUT\""
          general:
            - name: verify_session_id_used
              condition: "grep -q 'SESSION_abc123xyz789' <<< \"$COMMAND_OUTPUT\""

      - step: 3
        description: "Perform operation using session ID"
        command: |
          echo "Data retrieved for session: $session_id"
          echo "Session details: ID=$session_id, Active=true"
        expected:
          success: true
          result: '0'
          output: 'Data retrieved'
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q 'Data retrieved' <<< \"$COMMAND_OUTPUT\""
          general:
            - name: verify_session_in_output
              condition: "grep -q \"ID=$session_id\" <<< \"$COMMAND_OUTPUT\""
