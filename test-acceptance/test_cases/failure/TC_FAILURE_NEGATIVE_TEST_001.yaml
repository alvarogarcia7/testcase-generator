requirement: "FAILURE_NEGATIVE_TEST"
item: 1
tc: 1
id: 'TC_FAILURE_NEGATIVE_TEST_001'
description: 'Test case with expected failure (negative test) - verifies that expected failures are properly handled'

general_initial_conditions:
  system:
    - "Bash shell is available"
    - "Basic Unix utilities are installed"

initial_conditions:
  filesystem:
    - "Temporary directory /tmp is writable"

test_sequences:
  - id: 1
    name: "Negative Test Sequence"
    description: "Execute commands expected to fail for validation purposes"
    initial_conditions:
      system:
        - "Grep command is available"
    steps:
      - step: 1
        description: "Successfully print message"
        command: "echo 'Starting negative test'"
        expected:
          success: true
          result: 0
          output: "Starting negative test"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q 'Starting negative test' <<< \"$COMMAND_OUTPUT\""

      - step: 2
        description: "Test expected failure - grep for non-existent pattern"
        command: "grep 'SHOULD_NOT_EXIST_XYZ' /etc/passwd"
        expected:
          success: false
          result: 1
          output: ""
        verification:
          result: "[[ $EXIT_CODE -eq 1 ]]"
          output: "[[ -z \"$COMMAND_OUTPUT\" ]]"

      - step: 3
        description: "Continue after expected failure"
        command: "echo 'Negative test completed'"
        expected:
          success: true
          result: 0
          output: "Negative test completed"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q 'Negative test completed' <<< \"$COMMAND_OUTPUT\""

      - step: 4
        description: "Another expected failure - test directory creation failure"
        command: "mkdir /root/should_fail_directory"
        expected:
          success: false
          result: 1
          output: "Permission denied"
        verification:
          result: "[[ $EXIT_CODE -ne 0 ]]"
          output: "grep -qi 'permission denied' <<< \"$COMMAND_OUTPUT\" || grep -qi 'cannot create' <<< \"$COMMAND_OUTPUT\""
