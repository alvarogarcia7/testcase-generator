requirement: "FAILURE_INTERMEDIATE_STEP"
item: 1
tc: 1
id: 'TC_FAILURE_INTERMEDIATE_STEP_001'
description: 'Test case where an intermediate step fails - verifies that test execution halts after first step succeeds but second fails'

general_initial_conditions:
  system:
    - "Bash shell is available"
    - "Basic Unix utilities are installed"

initial_conditions:
  filesystem:
    - "Temporary directory /tmp is writable"

test_sequences:
  - id: 1
    name: "Intermediate Step Failure Sequence"
    description: "Execute commands where the middle step fails"
    initial_conditions:
      system:
        - "Echo and ls commands are available"
    steps:
      - step: 1
        description: "Print success message (succeeds)"
        command: "echo 'Step 1 completed'"
        expected:
          success: true
          result: 0
          output: "Step 1 completed"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q 'Step 1 completed' <<< \"$COMMAND_OUTPUT\""

      - step: 2
        description: "List non-existent directory (fails)"
        command: "ls /nonexistent/directory/path/xyz"
        expected:
          success: false
          result: 1
          output: "No such file or directory"
        verification:
          result: "[[ $EXIT_CODE -ne 0 ]]"
          output: "grep -q 'No such file or directory' <<< \"$COMMAND_OUTPUT\""

      - step: 3
        description: "This step should not execute"
        command: "echo 'Step 3 should not run'"
        expected:
          success: true
          result: 0
          output: "Step 3 should not run"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q 'Step 3 should not run' <<< \"$COMMAND_OUTPUT\""
