requirement: "FAILURE_OUTPUT_MISMATCH"
item: 1
tc: 1
id: 'TC_FAILURE_OUTPUT_MISMATCH_001'
description: 'Test case where command succeeds but output verification fails - tests output validation logic'

general_initial_conditions:
  system:
    - "Bash shell is available"
    - "Basic Unix utilities are installed"

initial_conditions:
  filesystem:
    - "Temporary directory /tmp is writable"

test_sequences:
  - id: 1
    name: "Output Mismatch Sequence"
    description: "Execute commands where output does not match expected values"
    initial_conditions:
      system:
        - "Echo command is available"
    steps:
      - step: 1
        description: "Print message that differs from expected output"
        command: "echo 'Actual output message'"
        expected:
          success: true
          result: 0
          output: "Expected output message"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q 'Expected output message' <<< \"$COMMAND_OUTPUT\""

      - step: 2
        description: "This step should not execute due to output mismatch"
        command: "echo 'Step 2'"
        expected:
          success: true
          result: 0
          output: "Step 2"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q 'Step 2' <<< \"$COMMAND_OUTPUT\""
