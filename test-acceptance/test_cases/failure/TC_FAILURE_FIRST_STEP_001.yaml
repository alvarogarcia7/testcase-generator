requirement: "FAILURE_FIRST_STEP"
item: 1
tc: 1
id: 'TC_FAILURE_FIRST_STEP_001'
description: 'Test case where the first step fails - verifies that test execution halts immediately on first failure'

general_initial_conditions:
  system:
    - "Bash shell is available"
    - "Basic Unix utilities are installed"

initial_conditions:
  filesystem:
    - "Temporary directory /tmp is writable"

test_sequences:
  - id: 1
    name: "First Step Failure Sequence"
    description: "Execute commands where the first step fails verification"
    initial_conditions:
      system:
        - "Grep command is available"
    steps:
      - step: 1
        description: "Search for pattern but expect it to be found (verification fails)"
        command: "grep 'NONEXISTENT_PATTERN_XYZ123' /etc/passwd"
        expected:
          success: true
          result: '0'
          output: "some pattern"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q 'some' <<< \"$COMMAND_OUTPUT\""

      - step: 2
        description: "This step should not execute due to verification failure"
        command: "echo 'This should not run'"
        expected:
          success: true
          result: '0'
          output: "This should not run"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q 'This should not run' <<< \"$COMMAND_OUTPUT\""

      - step: 3
        description: "This step should also not execute"
        command: "date"
        expected:
          success: true
          result: '0'
          output: "current date"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "true"
