type: test_case
schema: tcms/test-case.schema.v1.json
requirement: HOOK_BEFORE_STEP_ERROR
item: 1
tc: 1
id: TEST_HOOK_BEFORE_STEP_001
description: Hook error scenario for before_step hook - script exits with error code
  on third step
general_initial_conditions:
  system:
  - Shell environment is available
initial_conditions:
  system:
  - All commands can be executed
hooks:
  before_step:
    command: scripts/hook_before_step_error.sh
    on_error: fail
test_sequences:
- id: 1
  name: First Sequence - Before Step Hook Fails on Step 3
  description: 'First test sequence where before_step hook succeeds for steps 1 and
    2.

    On step 3, the before_step hook fails, preventing step 3 execution.

    The hook script detects step 3 and exits with error code 1.

    '
  initial_conditions:
    system:
    - Shell is ready
  steps:
  - step: 1
    description: Execute first step - before_step hook succeeds
    command: echo "Sequence 1 - Step 1 executed"
    expected:
      success: true
      result: 0
      output: Sequence 1 - Step 1 executed
    verification:
      result: '[[ $EXIT_CODE -eq 0 ]]'
      output: grep -q 'Sequence 1 - Step 1 executed' <<< "$COMMAND_OUTPUT"
  - step: 2
    description: Execute second step - before_step hook succeeds
    command: echo "Sequence 1 - Step 2 executed"
    expected:
      success: true
      result: 0
      output: Sequence 1 - Step 2 executed
    verification:
      result: '[[ $EXIT_CODE -eq 0 ]]'
      output: grep -q 'Sequence 1 - Step 2 executed' <<< "$COMMAND_OUTPUT"
  - step: 3
    description: This step should not execute - before_step hook fails
    command: echo "Sequence 1 - Step 3 should not run"
    expected:
      success: true
      result: 0
      output: Sequence 1 - Step 3 should not run
    verification:
      result: '[[ $EXIT_CODE -eq 0 ]]'
      output: grep -q 'Sequence 1 - Step 3 should not run' <<< "$COMMAND_OUTPUT"
  - step: 4
    description: This step should not execute - test terminated
    command: echo "Sequence 1 - Step 4 should not run"
    expected:
      success: true
      result: 0
      output: Sequence 1 - Step 4 should not run
    verification:
      result: '[[ $EXIT_CODE -eq 0 ]]'
      output: grep -q 'Sequence 1 - Step 4 should not run' <<< "$COMMAND_OUTPUT"
- id: 2
  name: Second Sequence - Not Executed
  description: 'Second test sequence that should not execute due to previous before_step
    hook failure.

    The before_step hook failed before step 3 of sequence 1, causing test termination.

    '
  initial_conditions:
    system:
    - Shell is ready
  steps:
  - step: 1
    description: This step should not execute
    command: echo "Sequence 2 - Step 1 should not run"
    expected:
      success: true
      result: 0
      output: Sequence 2 - Step 1 should not run
    verification:
      result: '[[ $EXIT_CODE -eq 0 ]]'
      output: grep -q 'Sequence 2 - Step 1 should not run' <<< "$COMMAND_OUTPUT"
