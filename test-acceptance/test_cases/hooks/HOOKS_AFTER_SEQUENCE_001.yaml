requirement: "HOOKS_AFTER_SEQUENCE"
item: 1
tc: 6
id: 'HOOKS_AFTER_SEQUENCE_001'
description: 'Tests after_sequence hook that executes after each test sequence'

hydration_vars:
  TEST_ENV:
    name: "TEST_ENV"
    description: "Test environment identifier"
    default_value: "acceptance"
    required: true

hooks:
  after_sequence:
    command: "test-acceptance/scripts/hooks/after_sequence_cleanup.sh"
    on_error: "continue"

general_initial_conditions:
  system:
    - "Bash shell is available"

initial_conditions:
  filesystem:
    - "Temporary directory /tmp is writable"
  hooks:
    - "after_sequence hook script exists and is executable"

test_sequences:
  - id: 1
    name: "First Sequence"
    description: "First test sequence with after_sequence hook"
    initial_conditions:
      system:
        - "Test sequence 1 is executing"
    steps:
      - step: 1
        description: "Create marker for after_sequence verification"
        command: "echo 'sequence 1 complete' > /tmp/after_sequence_marker_1_$$.txt && cat /tmp/after_sequence_marker_1_$$.txt"
        expected:
          success: true
          result: 0
          output: "sequence 1 complete"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q 'sequence 1 complete' <<< \"$COMMAND_OUTPUT\""

  - id: 2
    name: "Second Sequence"
    description: "Second test sequence to verify after_sequence hook ran"
    initial_conditions:
      system:
        - "after_sequence hook has executed for sequence 1"
    steps:
      - step: 1
        description: "Verify after_sequence cleaned up sequence 1 marker"
        command: "if [ -f /tmp/after_sequence_marker_1_$$.txt ]; then echo 'marker still exists'; else echo 'marker cleaned up'; fi"
        expected:
          success: true
          result: 0
          output: "marker cleaned up"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q 'marker cleaned up' <<< \"$COMMAND_OUTPUT\""
