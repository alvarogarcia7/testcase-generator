requirement: "HOOKS_MISSING_SCRIPT"
item: 1
tc: 1
id: 'TC_HOOKS_MISSING_001'
description: 'Test case with a missing hook script file to verify error handling when hook script does not exist.'

general_initial_conditions:
  system:
    - "Bash shell is available"

initial_conditions:
  filesystem:
    - "Hook script file does not exist"

hooks:
  script_start:
    command: "scripts/nonexistent_hook_script.sh"
    on_error: "fail"

test_sequences:
  - id: 1
    name: "Test with Missing Hook Script"
    description: |
                  This test should fail immediately because the script_start hook
                  references a non-existent script file.
    initial_conditions:
      system:
        - "Shell is ready"
    steps:
      - step: 1
        description: "This step should not execute due to missing hook script"
        command: echo "Step 1 should not run"
        expected:
          success: true
          result: 0
          output: "Step 1 should not run"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q 'Step 1 should not run' <<< \"$COMMAND_OUTPUT\""
