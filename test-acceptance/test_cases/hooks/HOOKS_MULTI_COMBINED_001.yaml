requirement: "HOOKS_MULTI_COMBINED"
item: 1
tc: 14
id: 'HOOKS_MULTI_COMBINED_001'
description: 'Tests multiple hook types working together in a single test case'

hydration_vars:
  TEST_ENV:
    name: "TEST_ENV"
    description: "Test environment identifier"
    default_value: "acceptance"
    required: true
  LOG_LEVEL:
    name: "LOG_LEVEL"
    description: "Logging level"
    default_value: "INFO"
    required: false

hooks:
  script_start:
    command: "test-acceptance/scripts/hooks/multi_script_start.sh"
    on_error: "fail"
  setup_test:
    command: "test-acceptance/scripts/hooks/multi_setup_test.sh"
    on_error: "fail"
  before_sequence:
    command: "test-acceptance/scripts/hooks/multi_before_sequence.sh"
    on_error: "fail"
  after_sequence:
    command: "test-acceptance/scripts/hooks/multi_after_sequence.sh"
    on_error: "continue"
  before_step:
    command: "test-acceptance/scripts/hooks/multi_before_step.sh"
    on_error: "fail"
  after_step:
    command: "test-acceptance/scripts/hooks/multi_after_step.sh"
    on_error: "continue"
  teardown_test:
    command: "test-acceptance/scripts/hooks/multi_teardown_test.sh"
    on_error: "continue"
  script_end:
    command: "test-acceptance/scripts/hooks/multi_script_end.sh"
    on_error: "continue"

general_initial_conditions:
  system:
    - "All hook scripts are available and executable"

initial_conditions:
  filesystem:
    - "Temporary directory /tmp is writable"
  hooks:
    - "All 8 hook types are configured"

test_sequences:
  - id: 1
    name: "First Combined Sequence"
    description: "First test sequence with multiple hooks"
    initial_conditions:
      system:
        - "script_start and setup_test hooks have executed"
    steps:
      - step: 1
        description: "Verify script_start hook executed"
        command: "test -f /tmp/multi_hooks_$$.log && grep 'script_start' /tmp/multi_hooks_$$.log"
        expected:
          success: true
          result: 0
          output: "script_start executed"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q 'script_start' <<< \"$COMMAND_OUTPUT\""

      - step: 2
        description: "Verify setup_test hook executed"
        command: "grep 'setup_test' /tmp/multi_hooks_$$.log"
        expected:
          success: true
          result: 0
          output: "setup_test executed"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q 'setup_test' <<< \"$COMMAND_OUTPUT\""

      - step: 3
        description: "Verify before_sequence hook executed"
        command: "grep 'before_sequence.*Sequence 1' /tmp/multi_hooks_$$.log"
        expected:
          success: true
          result: 0
          output: "before_sequence"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q 'before_sequence' <<< \"$COMMAND_OUTPUT\""

  - id: 2
    name: "Second Combined Sequence"
    description: "Second test sequence to verify hook transitions"
    initial_conditions:
      system:
        - "after_sequence hook for sequence 1 has executed"
    steps:
      - step: 1
        description: "Verify after_sequence hook executed for sequence 1"
        command: "grep 'after_sequence.*Sequence 1' /tmp/multi_hooks_$$.log"
        expected:
          success: true
          result: 0
          output: "after_sequence"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q 'after_sequence' <<< \"$COMMAND_OUTPUT\""

      - step: 2
        description: "Verify all hook types are present"
        command: "grep -c -E '(script_start|setup_test|before_sequence|after_step|before_step)' /tmp/multi_hooks_$$.log"
        expected:
          success: true
          result: 0
          output: "number"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "[[ \"$COMMAND_OUTPUT\" =~ ^[0-9]+$ ]]"

      - step: 3
        description: "Count total hook executions"
        command: "wc -l < /tmp/multi_hooks_$$.log | tr -d ' '"
        expected:
          success: true
          result: 0
          output: "number"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "[[ \"$COMMAND_OUTPUT\" =~ ^[0-9]+$ ]]"
