requirement: "HOOKS_ON_ERROR_FAIL"
item: 1
tc: 9
id: 'HOOKS_ON_ERROR_FAIL_001'
description: 'Tests that hook with on_error fail stops execution when hook fails'

hydration_vars:
  TEST_ENV:
    name: "TEST_ENV"
    description: "Test environment identifier"
    default_value: "acceptance"
    required: true

hooks:
  setup_test:
    command: "test-acceptance/scripts/hooks/fail_hook.sh"
    on_error: "fail"

general_initial_conditions:
  system:
    - "Bash shell is available"

initial_conditions:
  hooks:
    - "setup_test hook script exists and will fail"

test_sequences:
  - id: 1
    name: "Should Not Execute"
    description: "This sequence should not run due to failed setup hook"
    initial_conditions:
      system:
        - "This should not be reached"
    steps:
      - step: 1
        manual: true
        description: "This step should not run due to failed setup hook (marked manual because test is expected to fail)"
        command: "echo 'should not execute' > /tmp/should_not_exist_$$.txt"
        expected:
          success: true
          result: 0
          output: "should not execute"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q 'should not execute' <<< \"$COMMAND_OUTPUT\""
