requirement: "HOOKS_SCRIPT_END"
item: 1
tc: 4
id: 'HOOKS_SCRIPT_END_001'
description: 'Tests script_end hook that performs final cleanup and logging'

hydration_vars:
  TEST_ENV:
    name: "TEST_ENV"
    description: "Test environment identifier"
    default_value: "acceptance"
    required: true

hooks:
  script_end:
    command: "test-acceptance/scripts/hooks/script_end_final.sh"
    on_error: "continue"

general_initial_conditions:
  system:
    - "Bash shell is available"

initial_conditions:
  filesystem:
    - "Temporary directory /tmp is writable"
  hooks:
    - "script_end hook script exists and is executable"

test_sequences:
  - id: 1
    name: "Prepare for Script End"
    description: "Execute steps before script_end hook"
    initial_conditions:
      system:
        - "Test execution is active"
    steps:
      - step: 1
        description: "Create marker file for script_end hook"
        command: "echo 'script_end_marker' > /tmp/script_end_marker_$$.txt && cat /tmp/script_end_marker_$$.txt"
        expected:
          success: true
          result: 0
          output: "script_end_marker"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q 'script_end_marker' <<< \"$COMMAND_OUTPUT\""

      - step: 2
        description: "Final test step before script_end"
        command: "echo 'Test complete, script_end hook will execute next'"
        expected:
          success: true
          result: 0
          output: "Test complete"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q 'Test complete' <<< \"$COMMAND_OUTPUT\""
