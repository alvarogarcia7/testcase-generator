requirement: "ENVIRONMENT_VARIABLES"
item: 1
tc: 1
id: 'TC_SUCCESS_ENV_VARS_001'
description: 'Environment variable usage - demonstrates using environment variables in commands and validations'

general_initial_conditions:
  system:
    - "Bash shell is available"
    - "Environment variable support is enabled"

initial_conditions:
  environment:
    - "Environment variables can be set and read"

hydration_vars:
  TEST_USER:
    name: "TEST_USER"
    description: "Username for test operations"
    default_value: "testuser"
    required: true
  
  TEST_HOME:
    name: "TEST_HOME"
    description: "Home directory for test user"
    default_value: "/tmp/testhome"
    required: true
  
  TEST_PORT:
    name: "TEST_PORT"
    description: "Port number for test service"
    default_value: "8080"
    required: false

test_sequences:
  - id: 1
    name: "Environment Variable Usage"
    description: "Use environment variables in commands and verify their values"
    initial_conditions:
      environment:
        - "Required environment variables are set"
    steps:
      - step: 1
        description: "Display test user environment variable"
        command: "echo \"User: ${TEST_USER}\""
        expected:
          success: true
          result: '0'
          output: "User:"
        verification:
          result: "[[ $? -eq 0 ]]"
          output: "grep -q 'User: ' <<< \"$COMMAND_OUTPUT\""

      - step: 2
        description: "Create home directory using environment variable"
        command: "mkdir -p ${TEST_HOME} && echo 'Created: '${TEST_HOME}"
        expected:
          success: true
          result: '0'
          output: "Created:"
        verification:
          result: "[[ $? -eq 0 ]]"
          output: "grep -q 'Created:' <<< \"$COMMAND_OUTPUT\""

      - step: 3
        description: "Verify port is numeric"
        command: "echo ${TEST_PORT}"
        expected:
          success: true
          result: '0'
          output: "port number"
        verification:
          result: "[[ $? -eq 0 ]]"
          output: "[[ \"$COMMAND_OUTPUT\" =~ ^[0-9]+$ ]]"

      - step: 4
        description: "Create config file with environment variables"
        command: "echo \"user=${TEST_USER}\" > ${TEST_HOME}/config.txt && echo \"port=${TEST_PORT}\" >> ${TEST_HOME}/config.txt && cat ${TEST_HOME}/config.txt"
        expected:
          success: true
          result: '0'
          output: "user="
        verification:
          result: "[[ $? -eq 0 ]]"
          output: "grep -q 'user=' <<< \"$COMMAND_OUTPUT\" && grep -q 'port=' <<< \"$COMMAND_OUTPUT\""

      - step: 5
        description: "Cleanup test directory"
        command: "rm -rf ${TEST_HOME}"
        expected:
          success: true
          result: '0'
          output: ""
        verification:
          result: "[[ $? -eq 0 ]]"
          output: "true"
