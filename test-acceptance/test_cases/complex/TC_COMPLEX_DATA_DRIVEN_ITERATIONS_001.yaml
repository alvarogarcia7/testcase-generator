      result: 0
      output: duration
    verification:
      result: '[[ $EXIT_CODE -eq 0 ]]'
      output: '[[ "$COMMAND_OUTPUT" =~ ^[0-9]+$ ]]'
- id: 5
  name: Results Aggregation and Analysis
  description: Aggregate results from all iterations and generate analysis report
  initial_conditions:
    testing:
    - All iterations have completed
    - Results CSV file contains all iteration data
  steps:
  - step: 1
    description: Count total iterations completed
    command: tail -n +2 ${data_dir}/results/test_results_${test_run_id}.csv | wc -l
    capture_vars:
    - name: total_iterations
      capture: ([0-9]+)
    expected:
      success: true
      result: 0
      output: '3'
    verification:
      result: '[[ $EXIT_CODE -eq 0 ]]'
      output:
        condition: '[[ $total_iterations -ge 3 ]]'
        if_true:
        - echo 'Required iterations completed'
        if_false:
        - echo 'Fewer iterations than expected'
        always:
        - 'echo "Iterations: ${total_iterations}"'
  - step: 2
    description: Calculate average processing time across iterations
    command: tail -n +2 ${data_dir}/results/test_results_${test_run_id}.csv | awk
      -F',' '{sum+=$3; count++} END {if(count>0) print int(sum/count); else print
      0}'
    capture_vars:
    - name: avg_processing_time_ms
      capture: ([0-9]+)
    expected:
      success: true
      result: 0
      output: average
    verification:
      result: '[[ $EXIT_CODE -eq 0 ]]'
      output: '[[ "$COMMAND_OUTPUT" =~ ^[0-9]+$ ]]'
      general:
      - name: verify_avg_time_calculated
        condition: '[[ $avg_processing_time_ms =~ ^[0-9]+$ ]]'
  - step: 3
    description: Calculate minimum processing time
    command: tail -n +2 ${data_dir}/results/test_results_${test_run_id}.csv | awk
      -F',' 'NR==1 || $3<min {min=$3} END {print int(min)}'
    capture_vars:
    - name: min_processing_time_ms
      capture: ([0-9]+)
    expected:
      success: true
      result: 0
      output: minimum
    verification:
      result: '[[ $EXIT_CODE -eq 0 ]]'
      output: '[[ "$COMMAND_OUTPUT" =~ ^[0-9]+$ ]]'
  - step: 4
    description: Calculate maximum processing time
    command: tail -n +2 ${data_dir}/results/test_results_${test_run_id}.csv | awk
      -F',' 'NR==1 || $3>max {max=$3} END {print int(max)}'
    capture_vars:
    - name: max_processing_time_ms
      capture: ([0-9]+)
    expected:
      success: true
      result: 0
      output: maximum
    verification:
      result: '[[ $EXIT_CODE -eq 0 ]]'
      output: '[[ "$COMMAND_OUTPUT" =~ ^[0-9]+$ ]]'
  - step: 5
    description: Count successful iterations
    command: tail -n +2 ${data_dir}/results/test_results_${test_run_id}.csv | grep
      -c 'true'
    capture_vars:
    - name: success_count
      capture: ([0-9]+)
    expected:
      success: true
      result: 0
      output: count
    verification:
      result: '[[ $EXIT_CODE -eq 0 ]]'
      output: '[[ "$COMMAND_OUTPUT" =~ ^[0-9]+$ ]]'
  - step: 6
    description: Calculate success rate percentage
    command: echo "scale=2; (${success_count} * 100) / ${total_iterations}" | bc 2>/dev/null
      || echo 100
    capture_vars:
    - name: success_rate
      capture: ([0-9]+\\.?[0-9]*)
    expected:
      success: true
      result: 0
      output: percentage
    verification:
      result: '[[ $EXIT_CODE -eq 0 ]]'
      output:
        condition: '[[ $(echo "${success_rate} >= 90" | bc 2>/dev/null || echo 1)
          -eq 1 ]]'
        if_true:
        - echo 'Success rate meets quality threshold (>=90%)'
        if_false:
        - 'echo ''WARNING: Success rate below quality threshold'''
        always:
        - 'echo "Success rate: ${success_rate}%"'
  - step: 7
    description: Generate comprehensive analysis report
    command: 'cat > ${data_dir}/results/analysis_report_${test_run_id}.txt << EOF
      Data-Driven Test Analysis Report =================================

      Test Configuration: - Run ID: ${test_run_id} - Iterations Configured: ${ITERATION_COUNT}
      - Iterations Completed: ${total_iterations} - Data Set Size: ${DATA_SET_SIZE}
      items per iteration - Failure Threshold: ${FAILURE_THRESHOLD}%

      Performance Metrics: ------------------- - Average Processing Time: ${avg_processing_time_ms}ms
      - Minimum Processing Time: ${min_processing_time_ms}ms - Maximum Processing
      Time: ${max_processing_time_ms}ms - Processing Time Range: $((${max_processing_time_ms}
      - ${min_processing_time_ms}))ms

      Quality Metrics: --------------- - Successful Iterations: ${success_count} /
      ${total_iterations} - Success Rate: ${success_rate}% - Quality Threshold: 90%
      - Status: $([ $(echo "${success_rate} >= 90" | bc 2>/dev/null || echo 1) -eq
      1 ] && echo ''PASS'' || echo ''FAIL'')

      Individual Iteration Results: ---------------------------- Iteration 1: ${iter1_duration_ms}ms
      (${iter1_output_count} items) Iteration 2: ${iter2_duration_ms}ms (${iter2_output_count}
      items) Iteration 3: ${iter3_duration_ms}ms (${iter3_output_count} items)

      Data Verification: ----------------- - Input Files: $(ls ${data_dir}/input/
      | wc -l) - Output Files: $(ls ${data_dir}/output/ | wc -l) - Results Files:
      $(ls ${data_dir}/results/ | wc -l)

      Conclusion: ---------- $([ $(echo "${success_rate} >= 90" | bc 2>/dev/null ||
      echo 1) -eq 1 ] && echo ''All iterations completed successfully with acceptable
      performance.'' || echo ''Some iterations did not meet quality thresholds.'')

      Test data and results are available in: ${data_dir} EOF cat ${data_dir}/results/analysis_report_${test_run_id}.txt'
    expected:
      success: true
      result: 0
      output: Data-Driven Test Analysis Report
    verification:
      result: '[[ $EXIT_CODE -eq 0 ]]'
      output: 'grep -q ''Data-Driven Test Analysis Report'' <<< "$COMMAND_OUTPUT"
        && grep -q ''Success Rate: ${success_rate}%'' <<< "$COMMAND_OUTPUT"'
  - step: 8
    description: Verify analysis report completeness
    command: grep -E '(Performance Metrics|Quality Metrics|Individual Iteration|Conclusion)'
      ${data_dir}/results/analysis_report_${test_run_id}.txt | wc -l
    capture_vars:
    - name: report_sections
      capture: ([0-9]+)
    expected:
      success: true
      result: 0
      output: '4'
    verification:
      result: '[[ $EXIT_CODE -eq 0 ]]'
      output:
        condition: '[[ $report_sections -ge 4 ]]'
        if_true:
        - echo 'Report contains all required sections'
        if_false:
        - echo 'Report may be incomplete'
        always:
        - 'echo "Report sections: ${report_sections}"'
  - step: 9
    description: Archive test results and cleanup
    command: cd ${data_dir} && tar -czf /tmp/data_driven_results_${test_run_id}.tar.gz
      results/ 2>&1 | head -1 || echo 'Results archived' && rm -rf ${data_dir} &&
      echo 'Test cleanup complete'
    expected:
      success: true
      result: 0
      output: complete
    verification:
      result: '[[ $EXIT_CODE -eq 0 ]]'
      output: grep -q 'complete' <<< "$COMMAND_OUTPUT"
      general:
      - name: verify_cleanup_complete
        condition: '[[ ! -d "${data_dir}" ]]'
