- id: 4
  name: Iteration 3 - Data Processing
  description: Third iteration of data-driven test
  initial_conditions:
    testing:
    - Iteration 2 completed successfully
  steps:
  - step: 1
    description: Generate input data for iteration 3
    command: for i in $(seq 1 ${DATA_SET_SIZE}); do echo "DATA_ITEM_3_$i" >> ${data_dir}/input/iteration_3.txt;
      done && wc -l ${data_dir}/input/iteration_3.txt | awk '{print $1}'
    capture_vars:
