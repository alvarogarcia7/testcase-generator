type: test_case
schema: tcms/test-case.schema.v1.json
requirement: COMPLEX_DATA_DRIVEN_ITERATIONS
item: 1
tc: 9
id: TC_COMPLEX_DATA_DRIVEN_ITERATIONS_001
description: Data-driven test with multiple iterations and aggregated results - demonstrates
  iterative testing patterns
hooks:
  setup_test:
    command: test-acceptance/scripts/hooks/setup_test_workspace.sh
    on_error: fail
  before_sequence:
    command: test-acceptance/scripts/hooks/before_sequence_log.sh
    on_error: continue
  after_sequence:
    command: test-acceptance/scripts/hooks/after_sequence_cleanup.sh
    on_error: continue
  teardown_test:
    command: test-acceptance/scripts/hooks/teardown_test_final.sh
    on_error: continue
hydration_vars:
  ITERATION_COUNT:
    name: ITERATION_COUNT
    description: Number of test iterations to execute
    default_value: '5'
    required: false
  DATA_SET_SIZE:
    name: DATA_SET_SIZE
    description: Size of data set for each iteration
    default_value: '10'
    required: false
  FAILURE_THRESHOLD:
    name: FAILURE_THRESHOLD
    description: Maximum allowed failure percentage
    default_value: '10'
    required: false
  TEST_DATA_DIR:
    name: TEST_DATA_DIR
    description: Directory for test data files
    default_value: /tmp/data_driven_test
    required: true
general_initial_conditions:
  system:
  - Test iteration framework is available
  - Data aggregation utilities are present
  testing:
  - Multiple iterations can be executed
  - Results can be aggregated and analyzed
initial_conditions:
  filesystem:
  - Test data directory can be created
  testing:
  - Iteration counter can be maintained
  - Results can be accumulated across iterations
test_sequences:
- id: 1
  name: Test Data Preparation
  description: Prepare test data sets for iterative testing
  initial_conditions:
    testing:
    - Test data directory is available
  steps:
  - step: 1
    description: Create test data directory structure
    command: 'mkdir -p ${TEST_DATA_DIR}/{input,output,results} && echo ''Created:
      ''${TEST_DATA_DIR}'
    capture_vars:
    - name: data_dir
      capture: 'Created: (/tmp/[^\s]+)'
    expected:
      success: true
      result: 0
      output: 'Created:'
    verification:
      result: '[[ $EXIT_CODE -eq 0 ]]'
      output: grep -q 'Created:' <<< "$COMMAND_OUTPUT"
      general:
      - name: verify_data_dir_captured
        condition: '[[ -n "$data_dir" ]]'
      - name: verify_data_dir_exists
        condition: '[[ -d "$data_dir" ]]'
  - step: 2
    description: Generate test run identifier
    command: date +%Y%m%d_%H%M%S
    capture_vars:
    - name: test_run_id
      capture: ([0-9_]+)
    expected:
      success: true
      result: 0
      output: timestamp
    verification:
      result: '[[ $EXIT_CODE -eq 0 ]]'
      output: '[[ "$COMMAND_OUTPUT" =~ ^[0-9_]+$ ]]'
  - step: 3
    description: Initialize iteration counter and results file
    command: echo 0 > ${data_dir}/results/iteration_counter.txt && cat > ${data_dir}/results/test_results_${test_run_id}.csv
      << EOF iteration,data_size,processing_time_ms,success,error_count EOF cat ${data_dir}/results/test_results_${test_run_id}.csv
    expected:
      success: true
      result: 0
      output: iteration
    verification:
      result: '[[ $EXIT_CODE -eq 0 ]]'
      output: grep -q 'iteration' <<< "$COMMAND_OUTPUT"
  - step: 4
    description: Create test data manifest
    command: 'cat > ${data_dir}/test_manifest.txt << EOF Test Run Manifest =================
      Run ID: ${test_run_id} Iterations: ${ITERATION_COUNT} Data Set Size: ${DATA_SET_SIZE}
      Failure Threshold: ${FAILURE_THRESHOLD}% Data Directory: ${data_dir} Status:
      INITIALIZED EOF cat ${data_dir}/test_manifest.txt'
    expected:
      success: true
      result: 0
      output: Test Run Manifest
    verification:
      result: '[[ $EXIT_CODE -eq 0 ]]'
      output: 'grep -q ''Run ID: ${test_run_id}'' <<< "$COMMAND_OUTPUT"'
- id: 2
  name: Iteration 1 - Data Processing
  description: First iteration of data-driven test
  initial_conditions:
    testing:
    - Test data infrastructure is ready
    - Results file is initialized
  steps:
  - step: 1
    description: Generate input data for iteration 1
    command: for i in $(seq 1 ${DATA_SET_SIZE}); do echo "DATA_ITEM_1_$i" >> ${data_dir}/input/iteration_1.txt;
      done && wc -l ${data_dir}/input/iteration_1.txt | awk '{print $1}'
    capture_vars:
    - name: iter1_input_count
      capture: ([0-9]+)
    expected:
      success: true
      result: 0
      output: count
    verification:
      result: '[[ $EXIT_CODE -eq 0 ]]'
      output: '[[ "$COMMAND_OUTPUT" -eq ${DATA_SET_SIZE} ]]'
  - step: 2
    description: Capture iteration 1 start time
    command: date +%s%N
    capture_vars:
    - name: iter1_start_ns
      capture: ([0-9]+)
    expected:
      success: true
      result: 0
      output: timestamp
    verification:
      result: '[[ $EXIT_CODE -eq 0 ]]'
      output: '[[ "$COMMAND_OUTPUT" =~ ^[0-9]+$ ]]'
  - step: 3
    description: Process iteration 1 data
    command: grep 'DATA_ITEM' ${data_dir}/input/iteration_1.txt | sort | uniq > ${data_dir}/output/iteration_1_processed.txt
      && wc -l ${data_dir}/output/iteration_1_processed.txt | awk '{print $1}'
    capture_vars:
    - name: iter1_output_count
      capture: ([0-9]+)
    expected:
      success: true
      result: 0
      output: count
    verification:
      result: '[[ $EXIT_CODE -eq 0 ]]'
      output: '[[ "$COMMAND_OUTPUT" -eq ${DATA_SET_SIZE} ]]'
  - step: 4
    description: Capture iteration 1 end time and calculate duration
    command: date +%s%N
    capture_vars:
    - name: iter1_end_ns
      capture: ([0-9]+)
    expected:
      success: true
      result: 0
      output: timestamp
    verification:
      result: '[[ $EXIT_CODE -eq 0 ]]'
      output: '[[ "$COMMAND_OUTPUT" =~ ^[0-9]+$ ]]'
  - step: 5
    description: Calculate iteration 1 processing time and record results
    command: iter1_duration_ms=$(( (${iter1_end_ns} - ${iter1_start_ns}) / 1000000
      )) && echo "1,${iter1_output_count},${iter1_duration_ms},true,0" >> ${data_dir}/results/test_results_${test_run_id}.csv
      && echo $iter1_duration_ms
    capture_vars:
    - name: iter1_duration_ms
      capture: ([0-9]+)
    expected:
      success: true
      result: 0
      output: duration
    verification:
      result: '[[ $EXIT_CODE -eq 0 ]]'
      output: '[[ "$COMMAND_OUTPUT" =~ ^[0-9]+$ ]]'
      general:
      - name: verify_iter1_duration
        condition: '[[ $iter1_duration_ms -ge 0 ]]'
- id: 3
  name: Iteration 2 - Data Processing
  description: Second iteration of data-driven test
  initial_conditions:
    testing:
    - Iteration 1 completed successfully
  steps:
  - step: 1
    description: Generate input data for iteration 2
    command: for i in $(seq 1 ${DATA_SET_SIZE}); do echo "DATA_ITEM_2_$i" >> ${data_dir}/input/iteration_2.txt;
