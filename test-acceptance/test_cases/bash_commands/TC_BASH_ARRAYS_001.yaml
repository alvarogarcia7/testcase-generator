type: test_case
schema: tcms/test-case.schema.v1.json
requirement: BASH_ARRAY_OPERATIONS
item: 1
tc: 1
id: TC_BASH_ARRAYS_001
description: Bash array operations - indexed arrays with strict element validation
  (bash 3.2+ compatible)
general_initial_conditions:
  system:
  - Bash 3.2+ shell with array support is available
initial_conditions:
  environment:
  - Bash array operations are supported
test_sequences:
- id: 1
  name: Array Operations
  description: Test bash indexed arrays with element access and manipulation
  initial_conditions:
    system:
    - Array syntax works correctly
  steps:
  - step: 1
    description: Create and access array elements
    command: arr=(one two three); echo ${arr[0]} ${arr[1]} ${arr[2]}
    expected:
      success: true
      result: 0
      output: one two three
    verification:
      result: '[[ $? -eq 0 ]]'
      output: '[[ "$COMMAND_OUTPUT" == ''one two three'' ]]'
      general:
      - name: output_has_three_words
        condition: '[[ $(echo "$COMMAND_OUTPUT" | wc -w | awk ''{print $1}'') -eq
          3 ]]'
      - name: contains_one
        condition: '[[ "$COMMAND_OUTPUT" =~ one ]]'
      - name: contains_three
        condition: '[[ "$COMMAND_OUTPUT" =~ three ]]'
  - step: 2
    description: Get array length
    command: nums=(10 20 30 40 50); echo ${#nums[@]}
    capture_vars:
    - name: array_length
      capture: ^([0-9]+)$
    expected:
      success: true
      result: 0
      output: '5'
    verification:
      result: '[[ $? -eq 0 ]]'
      output: '[[ "$COMMAND_OUTPUT" == ''5'' ]]'
      general:
      - name: length_is_five
        condition: '[[ $array_length -eq 5 ]]'
  - step: 3
    description: Iterate array and sum using bash 3.2 compatible method
    command: values=(1 2 3 4 5); sum=0; for val in ${values[@]}; do sum=$((sum + val));
      done; echo $sum
    capture_vars:
    - name: total_sum
      capture: ^([0-9]+)$
    expected:
      success: true
      result: 0
      output: '15'
    verification:
      result: '[[ $? -eq 0 ]]'
      output: '[[ "$COMMAND_OUTPUT" == ''15'' ]]'
      general:
      - name: sum_correct
        condition: '[[ $total_sum -eq 15 ]]'
      - name: sum_matches_formula
        condition: '[[ $total_sum -eq $((5 * 6 / 2)) ]]'
  - step: 4
    description: Array slicing with indices
    command: letters=(a b c d e f); echo ${letters[@]:2:3}
    expected:
      success: true
      result: 0
      output: c d e
    verification:
      result: '[[ $? -eq 0 ]]'
      output: '[[ "$COMMAND_OUTPUT" == ''c d e'' ]]'
      general:
      - name: slice_has_three_elements
        condition: '[[ $(echo "$COMMAND_OUTPUT" | wc -w | awk ''{print $1}'') -eq
          3 ]]'
      - name: starts_with_c
        condition: '[[ "$COMMAND_OUTPUT" =~ ^c ]]'
      - name: ends_with_e
        condition: '[[ "$COMMAND_OUTPUT" =~ e$ ]]'
  - step: 5
    description: Append to array and verify
    command: colors=(red green); colors+=(blue); colors+=(yellow); echo ${#colors[@]}
      ${colors[2]} ${colors[3]}
    capture_vars:
    - name: final_count
      command: colors=(red green); colors+=(blue); colors+=(yellow); echo ${#colors[@]}
    expected:
      success: true
      result: 0
      output: 4 blue yellow
    verification:
      result: '[[ $? -eq 0 ]]'
      output: '[[ "$COMMAND_OUTPUT" =~ ^4 ]]'
      general:
      - name: count_is_four
        condition: '[[ $final_count -eq 4 ]]'
      - name: has_blue
        condition: '[[ "$COMMAND_OUTPUT" =~ blue ]]'
      - name: has_yellow
        condition: '[[ "$COMMAND_OUTPUT" =~ yellow ]]'
  - step: 6
    description: Check if element exists in array
    command: items=(apple banana cherry); for item in ${items[@]}; do if [[ $item
      == 'banana' ]]; then echo 'found'; break; fi; done
    expected:
      success: true
      result: 0
      output: found
    verification:
      result: '[[ $? -eq 0 ]]'
      output: '[[ "$COMMAND_OUTPUT" == ''found'' ]]'
      general:
      - name: found_banana
        condition: '[[ "$COMMAND_OUTPUT" =~ found ]]'
