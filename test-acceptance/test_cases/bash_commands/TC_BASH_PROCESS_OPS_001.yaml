requirement: REQ_BASH_PROCESS_OPS_001
item: 1
tc: 12
id: TC_BASH_PROCESS_OPS_001
description: Process management operations in bash
general_initial_conditions:
  system:
    - Shell environment is available
initial_conditions:
  system:
    - All commands can be executed
test_sequences:
  - id: 1
    name: Process Operations
    description: Test process management operations
    initial_conditions:
      system:
        - Shell is ready
    steps:
      - step: 1
        description: Get current shell PID
        command: echo $$
        expected:
          success: true
          result: "0"
          output: "0"
        verification:
          result: "[[ $? -eq 0 ]]"
          output: "[[ -n $(cat $COMMAND_OUTPUT) ]]"
      - step: 2
        description: Get exit status
        command: true; echo $?
        expected:
          success: true
          result: "0"
          output: "0"
        verification:
          result: "[[ $? -eq 0 ]]"
          output: "grep -q '0' $COMMAND_OUTPUT"
      - step: 3
        description: Run command in background status
        command: sleep 0.1 & wait $!; echo "done"
        expected:
          success: true
          result: "0"
          output: "done"
        verification:
          result: "[[ $? -eq 0 ]]"
          output: "grep -q 'done' $COMMAND_OUTPUT"
