requirement: REQ_BASH_STRING_OPS_001
item: 1
tc: 6
id: TC_BASH_STRING_OPS_001
description: String manipulation and transformation operations
general_initial_conditions:
  system:
    - Shell environment is available
initial_conditions:
  system:
    - All commands can be executed
test_sequences:
  - id: 1
    name: String Operations
    description: Test string manipulation operations
    initial_conditions:
      system:
        - Shell is ready
    steps:
      - step: 1
        description: String concatenation
        command: str1="Hello"; str2="World"; echo "$str1 $str2"
        expected:
          success: true
          result: "0"
          output: "Hello World"
        verification:
          result: "[[ $? -eq 0 ]]"
          output: "grep -q 'Hello World' $COMMAND_OUTPUT"
      - step: 2
        description: String length
        command: str="testing"; echo ${#str}
        expected:
          success: true
          result: "0"
          output: "7"
        verification:
          result: "[[ $? -eq 0 ]]"
          output: "grep -q '7' $COMMAND_OUTPUT"
      - step: 3
        description: Substring extraction
        command: str="Hello World"; echo ${str:0:5}
        expected:
          success: true
          result: "0"
          output: "Hello"
        verification:
          result: "[[ $? -eq 0 ]]"
          output: "grep -q 'Hello' $COMMAND_OUTPUT"
