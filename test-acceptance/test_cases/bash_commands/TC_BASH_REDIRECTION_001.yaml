requirement: REQ_BASH_REDIRECTION_001
item: 1
tc: 13
id: TC_BASH_REDIRECTION_001
description: Input/output redirection in bash
general_initial_conditions:
  system:
    - Shell environment is available
initial_conditions:
  system:
    - All commands can be executed
test_sequences:
  - id: 1
    name: Redirection Operations
    description: Test input/output redirection
    initial_conditions:
      system:
        - Shell is ready
    steps:
      - step: 1
        description: Redirect output to file
        command: echo "test output" > /tmp/redirect_test.txt; cat /tmp/redirect_test.txt; rm -f /tmp/redirect_test.txt
        expected:
          success: true
          result: "0"
          output: "test output"
        verification:
          result: "[[ $? -eq 0 ]]"
          output: "grep -q 'test output' $COMMAND_OUTPUT"
      - step: 2
        description: Append to file
        command: echo "line1" > /tmp/append_test.txt; echo "line2" >> /tmp/append_test.txt; cat /tmp/append_test.txt; rm -f /tmp/append_test.txt
        expected:
          success: true
          result: "0"
          output: "line2"
        verification:
          result: "[[ $? -eq 0 ]]"
          output: "grep -q 'line2' $COMMAND_OUTPUT"
      - step: 3
        description: Redirect stderr to stdout
        command: ls /nonexistent 2>&1 | grep -q "No such file" && echo "stderr captured"
        expected:
          success: true
          result: "0"
          output: "stderr captured"
        verification:
          result: "[[ $? -eq 0 ]]"
          output: "grep -q 'stderr captured' $COMMAND_OUTPUT"
