requirement: REQ_BASH_SIMPLE_001
item: 1
tc: 1
id: TC_BASH_SIMPLE_001
description: Basic bash commands - echo, date, pwd
general_initial_conditions:
  system:
    - Shell environment is available
initial_conditions:
  system:
    - All commands can be executed
test_sequences:
  - id: 1
    name: Simple Echo Command
    description: Test basic echo commands with various inputs
    initial_conditions:
      system:
        - Shell is ready
    steps:
      - step: 1
        description: Echo a simple message
        command: echo "Hello World"
        expected:
          success: true
          result: "0"
          output: "Hello World"
        verification:
          result: "[[ $? -eq 0 ]]"
          output: "grep -q 'Hello World' $COMMAND_OUTPUT"
      - step: 2
        description: Echo with special characters
        command: 'echo "Test: 123 @#$%"'
        expected:
          success: true
          result: "0"
          output: "Test: 123 @#$%"
        verification:
          result: "[[ $? -eq 0 ]]"
          output: "grep -q 'Test: 123' $COMMAND_OUTPUT"
      - step: 3
        description: Check current working directory
        command: pwd
        expected:
          success: true
          result: "0"
          output: "/"
        verification:
          result: "[[ $? -eq 0 ]]"
          output: "[[ -n $(cat $COMMAND_OUTPUT) ]]"
