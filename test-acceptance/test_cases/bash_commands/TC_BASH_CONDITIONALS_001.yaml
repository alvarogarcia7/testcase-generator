requirement: REQ_BASH_CONDITIONALS_001
item: 1
tc: 7
id: TC_BASH_CONDITIONALS_001
description: Conditional expressions and logic in bash
general_initial_conditions:
  system:
    - Shell environment is available
initial_conditions:
  system:
    - All commands can be executed
test_sequences:
  - id: 1
    name: Conditional Operations
    description: Test conditional expressions and comparisons
    initial_conditions:
      system:
        - Shell is ready
    steps:
      - step: 1
        description: Simple if condition
        command: if [ 1 -eq 1 ]; then echo "equal"; fi
        expected:
          success: true
          result: "0"
          output: "equal"
        verification:
          result: "[[ $? -eq 0 ]]"
          output: "grep -q 'equal' $COMMAND_OUTPUT"
      - step: 2
        description: String comparison
        command: str="test"; if [ "$str" = "test" ]; then echo "match"; fi
        expected:
          success: true
          result: "0"
          output: "match"
        verification:
          result: "[[ $? -eq 0 ]]"
          output: "grep -q 'match' $COMMAND_OUTPUT"
      - step: 3
        description: Numeric comparison
        command: a=5; if [ $a -gt 3 ]; then echo "greater"; fi
        expected:
          success: true
          result: "0"
          output: "greater"
        verification:
          result: "[[ $? -eq 0 ]]"
          output: "grep -q 'greater' $COMMAND_OUTPUT"
