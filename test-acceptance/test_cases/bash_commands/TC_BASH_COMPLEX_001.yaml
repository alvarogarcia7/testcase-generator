requirement: REQ_BASH_COMPLEX_001
item: 1
tc: 3
id: TC_BASH_COMPLEX_001
description: Complex bash command compositions
general_initial_conditions:
  system:
    - Shell environment is available
initial_conditions:
  system:
    - All commands can be executed
test_sequences:
  - id: 1
    name: Complex Command Chains
    description: Test complex command chains with multiple pipes and subshells
    initial_conditions:
      system:
        - Shell is ready
    steps:
      - step: 1
        description: Multiple pipes and filters
        command: echo -e "line1\nline2\nline3" | grep "line" | wc -l
        expected:
          success: true
          result: "0"
          output: "3"
        verification:
          result: "[[ $? -eq 0 ]]"
          output: "grep -q '3' $COMMAND_OUTPUT"
      - step: 2
        description: Command with subshell
        command: (echo "subshell"; echo "test")
        expected:
          success: true
          result: "0"
          output: "test"
        verification:
          result: "[[ $? -eq 0 ]]"
          output: "grep -q 'test' $COMMAND_OUTPUT"
      - step: 3
        description: Nested command substitution
        command: echo "Length is $(echo 'test' | wc -c)"
        expected:
          success: true
          result: "0"
          output: "Length is"
        verification:
          result: "[[ $? -eq 0 ]]"
          output: "grep -q 'Length is' $COMMAND_OUTPUT"
