requirement: REQ_BASH_ENV_VARS_001
item: 1
tc: 11
id: TC_BASH_ENV_VARS_001
description: Environment variable operations in bash
general_initial_conditions:
  system:
    - Shell environment is available
initial_conditions:
  system:
    - All commands can be executed
test_sequences:
  - id: 1
    name: Environment Variable Operations
    description: Test environment variable operations
    initial_conditions:
      system:
        - Shell is ready
    steps:
      - step: 1
        description: Set and use environment variable
        command: export TESTVAR="hello"; echo $TESTVAR
        expected:
          success: true
          result: "0"
          output: "hello"
        verification:
          result: "[[ $? -eq 0 ]]"
          output: "grep -q 'hello' $COMMAND_OUTPUT"
      - step: 2
        description: Default value for unset variable
        command: echo ${UNDEFINED_VAR:-default_value}
        expected:
          success: true
          result: "0"
          output: "default_value"
        verification:
          result: "[[ $? -eq 0 ]]"
          output: "grep -q 'default_value' $COMMAND_OUTPUT"
      - step: 3
        description: Check if variable is set
        command: MYVAR="test"; if [ -n "$MYVAR" ]; then echo "set"; fi
        expected:
          success: true
          result: "0"
          output: "set"
        verification:
          result: "[[ $? -eq 0 ]]"
          output: "grep -q 'set' $COMMAND_OUTPUT"
