requirement: REQ_BASH_MATH_OPS_001
item: 1
tc: 10
id: TC_BASH_MATH_OPS_001
description: Arithmetic operations in bash
general_initial_conditions:
  system:
    - Shell environment is available
initial_conditions:
  system:
    - All commands can be executed
test_sequences:
  - id: 1
    name: Math Operations
    description: Test arithmetic operations
    initial_conditions:
      system:
        - Shell is ready
    steps:
      - step: 1
        description: Simple addition
        command: echo $((5 + 3))
        expected:
          success: true
          result: "0"
          output: "8"
        verification:
          result: "[[ $? -eq 0 ]]"
          output: "grep -q '8' $COMMAND_OUTPUT"
      - step: 2
        description: Multiplication and division
        command: echo $((10 * 2 / 4))
        expected:
          success: true
          result: "0"
          output: "5"
        verification:
          result: "[[ $? -eq 0 ]]"
          output: "grep -q '5' $COMMAND_OUTPUT"
      - step: 3
        description: Modulo operation
        command: echo $((17 % 5))
        expected:
          success: true
          result: "0"
          output: "2"
        verification:
          result: "[[ $? -eq 0 ]]"
          output: "grep -q '2' $COMMAND_OUTPUT"
