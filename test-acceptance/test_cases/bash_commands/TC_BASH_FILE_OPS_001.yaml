requirement: REQ_BASH_FILE_OPS_001
item: 1
tc: 9
id: TC_BASH_FILE_OPS_001
description: File system operations in bash
general_initial_conditions:
  system:
    - Shell environment is available
initial_conditions:
  system:
    - All commands can be executed
test_sequences:
  - id: 1
    name: File Operations
    description: Test file system operations
    initial_conditions:
      system:
        - Shell is ready
    steps:
      - step: 1
        description: Create temporary file
        command: tmpfile=$(mktemp); echo "test" > $tmpfile; cat $tmpfile; rm $tmpfile
        expected:
          success: true
          result: "0"
          output: "test"
        verification:
          result: "[[ $? -eq 0 ]]"
          output: "grep -q 'test' $COMMAND_OUTPUT"
      - step: 2
        description: Check if file exists
        command: touch /tmp/testfile_bash; if [ -f /tmp/testfile_bash ]; then echo "exists"; fi; rm -f /tmp/testfile_bash
        expected:
          success: true
          result: "0"
          output: "exists"
        verification:
          result: "[[ $? -eq 0 ]]"
          output: "grep -q 'exists' $COMMAND_OUTPUT"
      - step: 3
        description: List directory contents
        command: ls /tmp | wc -l
        expected:
          success: true
          result: "0"
          output: "0"
        verification:
          result: "[[ $? -eq 0 ]]"
          output: "[[ -n $(cat $COMMAND_OUTPUT) ]]"
