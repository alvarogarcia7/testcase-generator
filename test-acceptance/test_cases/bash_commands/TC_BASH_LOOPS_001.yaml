type: test_case
schema: tcms/test-case.schema.v1.json
requirement: BASH_LOOP_OPERATIONS
item: 1
tc: 1
id: TC_BASH_LOOPS_001
description: Bash loop operations - for, while, until loops with break/continue and
  strict validation
general_initial_conditions:
  system:
  - Bash shell with loop support is available
initial_conditions:
  environment:
  - Loop constructs work correctly
test_sequences:
- id: 1
  name: Loop Constructs
  description: Test various bash loop types and control flow
  initial_conditions:
    system:
    - Loops execute correctly
  steps:
  - step: 1
    description: For loop with range
    command: for i in {1..5}; do echo -n "$i "; done; echo
    capture_vars:
    - name: loop_output
      capture: ^(.*)$
    expected:
      success: true
      result: 0
      output: 1 2 3 4 5
    verification:
      result: '[[ $? -eq 0 ]]'
      output: '[[ "$COMMAND_OUTPUT" =~ ^1.*5 ]]'
      general:
      - name: all_numbers_present
        condition: '[[ "$loop_output" =~ 1 && "$loop_output" =~ 5 ]]'
      - name: five_numbers
        condition: '[[ $(echo "$loop_output" | wc -w | awk ''{print $1}'') -eq 5 ]]'
  - step: 2
    description: For loop with array
    command: sum=0; for n in 10 20 30; do sum=$((sum + n)); done; echo $sum
    capture_vars:
    - name: sum_result
      capture: ^([0-9]+)$
    expected:
      success: true
      result: 0
      output: '60'
    verification:
      result: '[[ $? -eq 0 ]]'
      output: '[[ "$COMMAND_OUTPUT" == ''60'' ]]'
      general:
      - name: sum_correct
        condition: '[[ $sum_result -eq 60 ]]'
  - step: 3
    description: While loop with counter
    command: count=0; while [[ $count -lt 5 ]]; do count=$((count + 1)); done; echo
      $count
    capture_vars:
    - name: final_count
      capture: ^([0-9]+)$
    expected:
      success: true
      result: 0
      output: '5'
    verification:
      result: '[[ $? -eq 0 ]]'
      output: '[[ "$COMMAND_OUTPUT" == ''5'' ]]'
      general:
      - name: count_is_five
        condition: '[[ $final_count -eq 5 ]]'
  - step: 4
    description: Until loop
    command: num=1; until [[ $num -gt 5 ]]; do num=$((num + 1)); done; echo $num
    capture_vars:
    - name: until_result
      capture: ^([0-9]+)$
    expected:
      success: true
      result: 0
      output: '6'
    verification:
      result: '[[ $? -eq 0 ]]'
      output: '[[ "$COMMAND_OUTPUT" == ''6'' ]]'
      general:
      - name: until_correct
        condition: '[[ $until_result -eq 6 ]]'
  - step: 5
    description: For loop with break
    command: for i in {1..10}; do if [[ $i -eq 6 ]]; then break; fi; echo -n "$i ";
      done; echo
    capture_vars:
    - name: break_output
      capture: ^(.*)$
    expected:
      success: true
      result: 0
      output: 1 2 3 4 5
    verification:
      result: '[[ $? -eq 0 ]]'
      output: '[[ "$COMMAND_OUTPUT" =~ ^1.*5 ]]'
      general:
      - name: stopped_at_five
        condition: '[[ "$break_output" =~ 5 && ! "$break_output" =~ 6 ]]'
      - name: five_items
        condition: '[[ $(echo "$break_output" | wc -w | awk ''{print $1}'') -eq 5
          ]]'
  - step: 6
    description: For loop with continue
    command: for i in {1..5}; do if [[ $i -eq 3 ]]; then continue; fi; echo -n "$i
      "; done; echo
    capture_vars:
    - name: continue_output
      capture: ^(.*)$
    expected:
      success: true
      result: 0
      output: 1 2 4 5
    verification:
      result: '[[ $? -eq 0 ]]'
      output: '[[ "$COMMAND_OUTPUT" =~ ^1.*5 ]]'
      general:
      - name: skipped_three
        condition: '[[ ! "$continue_output" =~ '' 3 '' && "$continue_output" =~ ''
          2 '' && "$continue_output" =~ '' 4 '' ]]'
      - name: four_items
        condition: '[[ $(echo "$continue_output" | wc -w | awk ''{print $1}'') -eq
          4 ]]'
  - step: 7
    description: Nested loops
    command: for i in 1 2; do for j in a b; do echo -n "$i$j "; done; done; echo
    capture_vars:
    - name: nested_output
      capture: ^(.*)$
    expected:
      success: true
      result: 0
      output: 1a 1b 2a 2b
    verification:
      result: '[[ $? -eq 0 ]]'
      output: '[[ "$COMMAND_OUTPUT" =~ 1a.*1b.*2a.*2b ]]'
      general:
      - name: all_combinations
        condition: '[[ "$nested_output" =~ 1a && "$nested_output" =~ 2b ]]'
      - name: four_items
        condition: '[[ $(echo "$nested_output" | wc -w | awk ''{print $1}'') -eq 4
          ]]'
  - step: 8
    description: Loop with file processing
    command: mkdir -p /tmp/loop_test && touch /tmp/loop_test/f{1..3}.txt && count=0;
      for f in /tmp/loop_test/*.txt; do count=$((count + 1)); done; echo $count
    capture_vars:
    - name: file_count
      capture: ^([0-9]+)$
    expected:
      success: true
      result: 0
      output: '3'
    verification:
      result: '[[ $? -eq 0 ]]'
      output: '[[ "$COMMAND_OUTPUT" == ''3'' ]]'
      general:
      - name: counted_three
        condition: '[[ $file_count -eq 3 ]]'
  - step: 9
    description: Cleanup loop test directory
    command: rm -rf /tmp/loop_test && echo 'cleaned'
    expected:
      success: true
      result: 0
      output: cleaned
    verification:
      result: '[[ $? -eq 0 ]]'
      output: '[[ "$COMMAND_OUTPUT" == ''cleaned'' ]]'
      general:
      - name: dir_removed
        condition: '[[ ! -d /tmp/loop_test ]]'
