requirement: REQ_BASH_LOOPS_001
item: 1
tc: 8
id: TC_BASH_LOOPS_001
description: Loop constructs - for, while, until
general_initial_conditions:
  system:
    - Shell environment is available
initial_conditions:
  system:
    - All commands can be executed
test_sequences:
  - id: 1
    name: Loop Operations
    description: Test loop constructs and control flow
    initial_conditions:
      system:
        - Shell is ready
    steps:
      - step: 1
        description: Simple for loop
        command: for i in 1 2 3; do echo $i; done
        expected:
          success: true
          result: "0"
          output: "3"
        verification:
          result: "[[ $? -eq 0 ]]"
          output: "grep -q '3' $COMMAND_OUTPUT"
      - step: 2
        description: While loop
        command: i=1; while [ $i -le 3 ]; do echo $i; i=$((i+1)); done
        expected:
          success: true
          result: "0"
          output: "3"
        verification:
          result: "[[ $? -eq 0 ]]"
          output: "grep -q '3' $COMMAND_OUTPUT"
      - step: 3
        description: Loop with break
        command: for i in 1 2 3 4 5; do if [ $i -eq 3 ]; then break; fi; echo $i; done
        expected:
          success: true
          result: "0"
          output: "2"
        verification:
          result: "[[ $? -eq 0 ]]"
          output: "grep -q '2' $COMMAND_OUTPUT"
