requirement: "HOOKS_AFTER_STEP"
item: 1
tc: 8
id: 'HOOKS_AFTER_STEP_001'
description: 'Tests after_step hook that executes after each test step'

hydration_vars:
  TEST_ENV:
    name: "TEST_ENV"
    description: "Test environment identifier"
    default_value: "acceptance"
    required: true

hooks:
  after_step:
    command: "test-acceptance/scripts/hooks/after_step_metrics.sh"
    on_error: "continue"

general_initial_conditions:
  system:
    - "Bash shell is available"

initial_conditions:
  filesystem:
    - "Temporary directory /tmp is writable"
  hooks:
    - "after_step hook script exists and is executable"

test_sequences:
  - id: 1
    name: "Step Hook Execution"
    description: "Test sequence with after_step hook for each step"
    initial_conditions:
      system:
        - "after_step hook is active"
    steps:
      - step: 1
        description: "First step with after_step hook"
        command: "echo 'step 1 output'"
        expected:
          success: true
          result: 0
          output: "step 1 output"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q 'step 1 output' <<< \"$COMMAND_OUTPUT\""

      - step: 2
        description: "Second step with after_step hook"
        command: "echo 'step 2 output'"
        expected:
          success: true
          result: 0
          output: "step 2 output"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q 'step 2 output' <<< \"$COMMAND_OUTPUT\""

      - step: 3
        description: "Verify after_step hook created metrics"
        command: "test -f /tmp/after_step_metrics_$$.log && wc -l < /tmp/after_step_metrics_$$.log"
        expected:
          success: true
          result: 0
          output: "2"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "[[ \"$COMMAND_OUTPUT\" =~ ^[0-9]+$ ]]"

      - step: 4
        description: "Cleanup metrics file"
        command: "rm -f /tmp/after_step_metrics_$$.log"
        expected:
          success: true
          result: 0
          output: ""
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "true"
