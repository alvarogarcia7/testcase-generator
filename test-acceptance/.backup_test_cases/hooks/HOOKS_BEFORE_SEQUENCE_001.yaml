requirement: "HOOKS_BEFORE_SEQUENCE"
item: 1
tc: 5
id: 'HOOKS_BEFORE_SEQUENCE_001'
description: 'Tests before_sequence hook that executes before each test sequence'

hydration_vars:
  TEST_ENV:
    name: "TEST_ENV"
    description: "Test environment identifier"
    default_value: "acceptance"
    required: true

hooks:
  before_sequence:
    command: "test-acceptance/scripts/hooks/before_sequence_init.sh"
    on_error: "fail"

general_initial_conditions:
  system:
    - "Bash shell is available"

initial_conditions:
  filesystem:
    - "Temporary directory /tmp is writable"
  hooks:
    - "before_sequence hook script exists and is executable"

test_sequences:
  - id: 1
    name: "First Sequence"
    description: "First test sequence with before_sequence hook"
    initial_conditions:
      system:
        - "before_sequence hook has executed for sequence 1"
    steps:
      - step: 1
        description: "Verify before_sequence hook executed for sequence 1"
        command: "test -f /tmp/before_sequence_1_$$.txt && cat /tmp/before_sequence_1_$$.txt"
        expected:
          success: true
          result: 0
          output: "before_sequence 1"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q 'before_sequence 1' <<< \"$COMMAND_OUTPUT\""

  - id: 2
    name: "Second Sequence"
    description: "Second test sequence with before_sequence hook"
    initial_conditions:
      system:
        - "before_sequence hook has executed for sequence 2"
    steps:
      - step: 1
        description: "Verify before_sequence hook executed for sequence 2"
        command: "test -f /tmp/before_sequence_2_$$.txt && cat /tmp/before_sequence_2_$$.txt"
        expected:
          success: true
          result: 0
          output: "before_sequence 2"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q 'before_sequence 2' <<< \"$COMMAND_OUTPUT\""

      - step: 2
        description: "Cleanup marker files"
        command: "rm -f /tmp/before_sequence_*_$$.txt"
        expected:
          success: true
          result: 0
          output: ""
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "true"
