requirement: "HOOKS_VARIABLES"
item: 1
tc: 13
id: 'HOOKS_VARIABLES_001'
description: 'Tests that hooks can access and set environment variables'

hydration_vars:
  TEST_ENV:
    name: "TEST_ENV"
    description: "Test environment identifier"
    default_value: "acceptance"
    required: true
  HOOK_VAR:
    name: "HOOK_VAR"
    description: "Variable set by hooks"
    default_value: "default_value"
    required: false

hooks:
  setup_test:
    command: "test-acceptance/scripts/hooks/setup_test_vars.sh"
    on_error: "fail"

general_initial_conditions:
  system:
    - "Bash shell is available"

initial_conditions:
  hooks:
    - "setup_test hook can set environment variables"

test_sequences:
  - id: 1
    name: "Variable Access Verification"
    description: "Verify hooks can access and set variables"
    initial_conditions:
      system:
        - "setup_test hook has set variables"
    steps:
      - step: 1
        description: "Verify hook set environment variable"
        command: "echo ${HOOK_WORKSPACE:-not_set}"
        expected:
          success: true
          result: 0
          output: "/tmp/hook_workspace"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q '/tmp/hook_workspace' <<< \"$COMMAND_OUTPUT\""

      - step: 2
        description: "Verify hook can read hydration variables"
        command: "echo ${TEST_ENV}"
        expected:
          success: true
          result: 0
          output: "acceptance"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q 'acceptance' <<< \"$COMMAND_OUTPUT\""
