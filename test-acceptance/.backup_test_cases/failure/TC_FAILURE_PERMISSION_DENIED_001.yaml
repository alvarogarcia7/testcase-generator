requirement: "FAILURE_PERMISSION_DENIED"
item: 1
tc: 1
id: 'TC_FAILURE_PERMISSION_DENIED_001'
description: 'Test case with permission denied error - verifies handling of permission-related failures'

general_initial_conditions:
  system:
    - "Bash shell is available"
    - "Basic Unix utilities are installed"
    - "Running as non-root user"

initial_conditions:
  filesystem:
    - "System directories have proper permissions"

test_sequences:
  - id: 1
    name: "Permission Denied Sequence"
    description: "Attempt operations that require elevated privileges"
    initial_conditions:
      system:
        - "Test is running as non-privileged user"
    steps:
      - step: 1
        description: "Attempt to write to root-owned directory"
        command: "echo 'test' > /etc/test_file.txt"
        expected:
          success: false
          result: '1'
          output: "Permission denied"
        verification:
          result: "[[ $EXIT_CODE -ne 0 ]]"
          output: "grep -qi 'permission denied' <<< \"$COMMAND_OUTPUT\" || grep -qi 'cannot create' <<< \"$COMMAND_OUTPUT\""

      - step: 2
        description: "This step should not execute"
        command: "echo 'Step 2'"
        expected:
          success: true
          result: '0'
          output: "Step 2"
        verification:
          result: "[[ $EXIT_CODE -eq 0 ]]"
          output: "grep -q 'Step 2' <<< \"$COMMAND_OUTPUT\""
