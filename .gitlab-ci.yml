stages:
  - test
  - deploy

test-docs-docker-build:
  stage: test
  image: docker:24-dind
  services:
    - docker:24-dind
  variables:
    DOCKER_DRIVER: overlay2
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - apk add --no-cache bash make
    - make test-docs-docker-build
  only:
    - main
    - merge_requests

pages:
  stage: deploy
  image: python:3.11
  script:
    - pip install -r requirements.txt
    - ENABLE_PDF_EXPORT=1 mkdocs build --site-dir public
  artifacts:
    paths:
      - public
    expire_in: 30 days
  cache:
    paths:
      - ~/.cache/pip
  only:
    - main
