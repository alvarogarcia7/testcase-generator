
stages:
  - docker
  - rust
  - e2e

variables:
  DOCKER_HOST: "tcp://server-custom-dind.custom-dind:2375"
  # Move cargo data into the project directory so it can be cached by the runner
  CARGO_HOME: ${CI_PROJECT_DIR}/.cargo
  RUSTFLAGS: "-Dwarnings"
  RUSTDOCFLAGS: "-Dwarnings"
  RUST_BACKTRACE: "1"
  # sccache does not support incremental compilation; disable it globally
  CARGO_INCREMENTAL: "0"
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"
  # sccache configuration for build caching
  # In CI: Use project directory for GitLab Runner cache compatibility
  # In local dev: Uses ~/.cache/sccache/testcase-manager (configured in .cargo/config.toml)
  RUSTC_WRAPPER: sccache
  SCCACHE_DIR: ${CI_PROJECT_DIR}/.sccache
  SCCACHE_CACHE_SIZE: 5G
  # Python 3.14 is managed via uv package manager
  # All Python scripts should be run with: uv run python3.14 script.py

docker:build:
  stage: docker
  image: docker:27-cli
  script:
    - export COMMIT_SHA=$(git rev-parse --short HEAD)
    - echo "COMMIT_SHA=$COMMIT_SHA" >> build.env
    - echo "Building Python + Docker client image"
    - docker build -t $CI_REGISTRY_IMAGE:${COMMIT_SHA} .
    - docker inspect  $CI_REGISTRY_IMAGE:${COMMIT_SHA} | tee docker_inspect.json
    - docker run --rm $CI_REGISTRY_IMAGE:${COMMIT_SHA} ls
    - docker run --rm $CI_REGISTRY_IMAGE:${COMMIT_SHA} /usr/local/bin/editor --help
    # Verify Python 3.14 is available in the image
    - docker run --rm $CI_REGISTRY_IMAGE:${COMMIT_SHA} python3.14 --version
    - docker run --rm $CI_REGISTRY_IMAGE:${COMMIT_SHA} python3 --version
    - docker run --rm $CI_REGISTRY_IMAGE:${COMMIT_SHA} uv --version
    # Verify cargo works offline
    - docker run --rm --net none $CI_REGISTRY_IMAGE:${COMMIT_SHA} cargo --offline build --all --all-features --release
    - docker run --rm --net none $CI_REGISTRY_IMAGE:${COMMIT_SHA} cargo --offline build --all --all-features
    # Push the image to the registry for
    - echo "$CI_REGISTRY_PASSWORD" | docker login $CI_REGISTRY -u $CI_REGISTRY_USER --password-stdin
    - docker push $CI_REGISTRY_IMAGE:${COMMIT_SHA}
    - docker tag ${CI_REGISTRY_IMAGE}:${COMMIT_SHA} ${CI_REGISTRY_IMAGE}:latest
    - docker push $CI_REGISTRY_IMAGE:latest
    - docker inspect $CI_REGISTRY_IMAGE:test | tee docker_inspect.json
  artifacts:
    name: "docker-verify-$CI_COMMIT_REF_SLUG"
    paths:
      - docker_inspect.json
    reports:
      dotenv: build.env
    expire_in: 1 week
  tags:
    - dind-amd

docker:test:
  stage: docker
  # Variable comes from artifacts->VARIABLE_NAME
  image: ${CI_REGISTRY_IMAGE}:${COMMIT_SHA}
  # https://gitlab.com/gitlab-org/gitlab-runner/-/work_items/903#:~:text=by%20Koen%20Lekkerkerker-,Problem,%F0%9F%91%8D%2022%20%F0%9F%91%8E%200
  needs:
    - job: docker:build
      artifacts: true
  variables:
    DOCKER_RUN_FLAGS: "--net none"
  script:
    - uname -a
#    - cargo --offline build --all --all-features --release
    #error: no matching package named `chrono` found
    #location searched: crates.io index
    #required by package `testcase-manager v0.1.0 (/builds/int/test-case-management-system/tcms-cli)`
    #As a reminder, you're using offline mode (--offline) which can sometimes cause surprising resolution failures, if this error is too confusing you may wish to retry without `--offline`.
#    - cargo --offline build --all --all-features
    - /usr/local/bin/editor --help
  tags:
    - dind-amd

docker:push:
  stage: docker
  image: docker:27-cli
  dependencies:
    - docker:build
    - docker:test
  needs:
    - job: docker:test
      artifacts: true
    - job: docker:build
      artifacts: true
  script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login $CI_REGISTRY -u $CI_REGISTRY_USER --password-stdin
    - find . || true
    - ls -la build.env || true
    - echo "COMMIT_SHA=$COMMIT_SHA" # Debugging output
    - echo "Pushing Docker image to registry"
    - echo "COMMIT_SHA=$COMMIT_SHA" # Debugging output
    - echo "CI_REGISTRY_IMAGE=$CI_REGISTRY_IMAGE" # Debugging output
    - echo "Pulling image ${CI_REGISTRY_IMAGE}:${COMMIT_SHA} to verify it exists before pushing latest tag" # Debugging output
    - docker pull ${CI_REGISTRY_IMAGE}:${COMMIT_SHA} || { echo "Failed to pull image ${CI_REGISTRY_IMAGE}:${COMMIT_SHA}. Check if the build stage pushed the image correctly."; exit 1; }
  # Variable comes from artifacts->VARIABLE_NAME
    - docker pull ${CI_REGISTRY_IMAGE}:${COMMIT_SHA}
    - docker tag ${CI_REGISTRY_IMAGE}:${COMMIT_SHA} ${CI_REGISTRY_IMAGE}:latest
#    - docker push $CI_REGISTRY_IMAGE:${COMMIT_SHA} - No need, already pushed
    - docker push $CI_REGISTRY_IMAGE:latest
#  only:
#    - master
#    - main
  tags:
    - dind-amd



rust:build-test-lint:
  before_script:
    - rustc --version
    - cargo --version
    - apt-get update -qq
    - apt-get install -y -qq curl jq
    # Install uv package manager
    - curl -LsSf https://astral.sh/uv/install.sh | sh
    - export PATH="$HOME/.cargo/bin:$PATH"
    # Install Python 3.14 using uv
    - uv python install 3.14
    # Sync Python dependencies
    - uv sync --python 3.14
    # Install sccache using the installation script
    - ./scripts/install-sccache.sh --ci
    # Install coverage tools using the installation script
    - ./scripts/install-coverage-tools.sh --gitlab
    # Detect changed crates for selective builds
    - |
      echo "===== Detecting Changed Crates ====="
      export AFFECTED_CRATES=""
      export BUILD_ALL_CRATES="false"
      
      # Check if we're on a protected branch (main, master, etc.) or if change detection should be skipped
      if [[ "$CI_COMMIT_REF_PROTECTED" == "true" ]] || [[ "$CI_COMMIT_BRANCH" == "main" ]] || [[ "$CI_COMMIT_BRANCH" == "master" ]]; then
        echo "Running on protected branch '$CI_COMMIT_BRANCH' - building all crates"
        export BUILD_ALL_CRATES="true"
      elif [[ -z "$CI_MERGE_REQUEST_DIFF_BASE_SHA" ]]; then
        echo "CI_MERGE_REQUEST_DIFF_BASE_SHA not set - building all crates"
        export BUILD_ALL_CRATES="true"
      else
        # Run change detection script
        if DETECTED_CRATES=$(./scripts/ci-detect-changes.sh 2>&1); then
          if [[ -n "$DETECTED_CRATES" ]]; then
            export AFFECTED_CRATES="$DETECTED_CRATES"
            echo "Detected affected crates: $AFFECTED_CRATES"
            # Count the number of affected crates
            CRATE_COUNT=$(echo "$AFFECTED_CRATES" | wc -w)
            echo "Number of affected crates: $CRATE_COUNT"
          else
            echo "No crates affected by changes - will skip build/test/lint"
            export AFFECTED_CRATES=""
          fi
        else
          echo "Change detection failed - falling back to building all crates"
          export BUILD_ALL_CRATES="true"
        fi
      fi
  image: rust:latest
  cache:
    key: "${CI_COMMIT_REF_SLUG}"
    paths:
      # Cache the cargo home directory which contains registries and bins
#      - .cargo
      # Cache the build artifacts directory
#      - target
      # Cache sccache compilation cache
      - .sccache
      # Cache uv and Python environments
      - .venv
      - $HOME/.cargo/bin/uv
      - $HOME/.local/share/uv
    # This ensures the cache is available to all jobs in the pipeline
    policy: pull-push
  stage: rust
  script:
    # Add required components
    - rustup component add clippy rustfmt

    # Build
    - echo "===== Building Release Binaries ====="
    - |
      if [[ "$BUILD_ALL_CRATES" == "true" ]]; then
        echo "Building all crates in workspace"
        cargo build --all --all-features --release
      elif [[ -n "$AFFECTED_CRATES" ]]; then
        echo "Building only affected crates: $AFFECTED_CRATES"
        for crate in $AFFECTED_CRATES; do
          echo "Building crate: $crate"
          cargo build -p "$crate" --all-features --release || {
            echo "Failed to build crate $crate, falling back to workspace build"
            cargo build --all --all-features --release
            break
          }
        done
      else
        echo "No crates to build - skipping build step"
      fi
    - echo "===== sccache Statistics ====="
    - sccache --show-stats
    
    # Collect binaries from affected crates
    - mkdir -p artifacts/binaries
    - |
      if [[ "$BUILD_ALL_CRATES" == "true" ]]; then
        echo "Collecting all binaries"
        cp target/release/validate-yaml artifacts/binaries/ || true
        cp target/release/validate-json artifacts/binaries/ || true
        cp target/release/trm artifacts/binaries/ || true
        cp target/release/test-verify artifacts/binaries/ || true
        cp target/release/test-executor artifacts/binaries/ || true
        cp target/release/test-orchestrator artifacts/binaries/ || true
        cp target/release/editor artifacts/binaries/ || true
        cp target/release/json-escape artifacts/binaries/ || true
        cp target/release/json-to-yaml artifacts/binaries/ || true
        cp target/release/script-cleanup artifacts/binaries/ || true
        cp target/release/verifier artifacts/binaries/ || true
        cp target/release/test-plan-documentation-generator-compat artifacts/binaries/ || true
      elif [[ -n "$AFFECTED_CRATES" ]]; then
        echo "Collecting binaries from affected crates"
        # Map crate names to their binary names
        for crate in $AFFECTED_CRATES; do
          case "$crate" in
            validate-yaml)
              cp target/release/validate-yaml artifacts/binaries/ || true
              ;;
            validate-json)
              cp target/release/validate-json artifacts/binaries/ || true
              ;;
            test-run-manager)
              cp target/release/trm artifacts/binaries/ || true
              ;;
            test-verify)
              cp target/release/test-verify artifacts/binaries/ || true
              ;;
            test-executor)
              cp target/release/test-executor artifacts/binaries/ || true
              ;;
            test-orchestrator)
              cp target/release/test-orchestrator artifacts/binaries/ || true
              ;;
            editor)
              cp target/release/editor artifacts/binaries/ || true
              ;;
            json-escape)
              cp target/release/json-escape artifacts/binaries/ || true
              ;;
            json-to-yaml)
              cp target/release/json-to-yaml artifacts/binaries/ || true
              ;;
            script-cleanup)
              cp target/release/script-cleanup artifacts/binaries/ || true
              ;;
            verifier)
              cp target/release/verifier artifacts/binaries/ || true
              ;;
            tpdg-compat)
              cp target/release/test-plan-documentation-generator-compat artifacts/binaries/ || true
              ;;
          esac
        done
      fi

    # Lint - rustfmt
    - echo "===== Running rustfmt ====="
    - |
      if [[ "$BUILD_ALL_CRATES" == "true" ]]; then
        cargo fmt --all -- --check
      elif [[ -n "$AFFECTED_CRATES" ]]; then
        for crate in $AFFECTED_CRATES; do
          echo "Running rustfmt on crate: $crate"
          cargo fmt -p "$crate" -- --check
        done
      else
        echo "No crates to format - skipping rustfmt"
      fi

    # Lint - clippy
    - echo "===== Running Clippy ====="
    - |
      if [[ "$BUILD_ALL_CRATES" == "true" ]]; then
        cargo clippy --all --all-features --tests -- -D warnings 2>&1 | tee clippy_output.txt
      elif [[ -n "$AFFECTED_CRATES" ]]; then
        for crate in $AFFECTED_CRATES; do
          echo "Running clippy on crate: $crate"
          cargo clippy -p "$crate" --all-features --tests -- -D warnings 2>&1 | tee -a clippy_output.txt
        done
      else
        echo "No crates to lint - skipping clippy"
        touch clippy_output.txt
      fi

    # Test - unit tests
    - echo "===== Running Unit Tests ====="
    - |
      if [[ "$BUILD_ALL_CRATES" == "true" ]]; then
        cargo test --all --all-features --tests --no-fail-fast -- --test-threads=1 2>&1 | tee test_output.txt
      elif [[ -n "$AFFECTED_CRATES" ]]; then
        for crate in $AFFECTED_CRATES; do
          echo "Running tests for crate: $crate"
          cargo test -p "$crate" --all-features --tests --no-fail-fast -- --test-threads=1 2>&1 | tee -a test_output.txt
        done
      else
        echo "No crates to test - skipping tests"
        touch test_output.txt
      fi
    - uv run python3.14 scripts/ci_parse_test_results.py test_output.txt > test_results.json

    # Test - doc tests
    - echo "===== Running Doc Tests ====="
    - |
      if [[ "$BUILD_ALL_CRATES" == "true" ]]; then
        cargo test --doc 2>&1 | tee doc_test_output.txt || true
      elif [[ -n "$AFFECTED_CRATES" ]]; then
        for crate in $AFFECTED_CRATES; do
          echo "Running doc tests for crate: $crate"
          cargo test --doc -p "$crate" 2>&1 | tee -a doc_test_output.txt || true
        done
      else
        echo "No crates to doc test - skipping doc tests"
        touch doc_test_output.txt
      fi
    - echo "===== sccache Statistics After Tests ====="
    - sccache --show-stats

    # Coverage
    - export CARGO_INCREMENTAL=0
    - export RUSTFLAGS="-Cinstrument-coverage"
    - export LLVM_PROFILE_FILE="coverage-%p-%m.profraw"
    - |
      if [[ "$BUILD_ALL_CRATES" == "true" ]]; then
        cargo test --all --all-features --tests
      elif [[ -n "$AFFECTED_CRATES" ]]; then
        for crate in $AFFECTED_CRATES; do
          echo "Running coverage tests for crate: $crate"
          cargo test -p "$crate" --all-features --tests
        done
      else
        echo "No crates to test for coverage - skipping coverage"
      fi
    - ./grcov . --binary-path ./target/debug/ -s . -t lcov --branch --ignore-not-existing --ignore "/*" -o lcov.info
    - ./grcov . --binary-path ./target/debug/ -s . -t html --branch --ignore-not-existing --ignore "/*" -o coverage/html
    - |
      if [ -n "$CI_MERGE_REQUEST_IID" ]; then
        uv run python3.14 scripts/ci_compare_coverage.py lcov.info > coverage_report.json
        uv run python3.14 scripts/ci_post_coverage_comment.py coverage_report.json
      fi
    - echo "===== Final sccache Statistics ====="
    - sccache --show-stats
  after_script:
    - export PATH="$HOME/.cargo/bin:$PATH"
    - |
      if [ -f test_results.json ]; then
        uv run python3.14 scripts/ci_post_mr_comment.py test_results.json || true
      fi
    - |
      if [ -f clippy_output.txt ] && grep -q "warning:" clippy_output.txt; then
        uv run python3.14 scripts/ci_post_clippy_comment.py clippy_output.txt || true
      fi
  coverage: '/lines\.*: \d+\.\d+%/'
  artifacts:
    name: "rust-artifacts-$CI_COMMIT_REF_SLUG"
    paths:
      - lcov.info
      - coverage/
      - coverage_report.json
      - test_output.txt
      - test_results.json
      - e2e_output.txt
      - doc_test_output.txt
      - clippy_output.txt
      - artifacts/binaries/
    reports:
      junit: test_results.xml
      coverage_report:
        coverage_format: cobertura
        path: cobertura.xml
    expire_in: 1 week
    when: always

docker:verify:
  stage: docker
  image: python:3.14-slim
  dependencies:
    - docker:build
  needs:
    - docker:build
  before_script:
    - apt-get update -qq
    - apt-get install -y -qq curl
    # Install uv package manager
    - curl -LsSf https://astral.sh/uv/install.sh | sh
    - export PATH="$HOME/.cargo/bin:$PATH"
    # Sync Python dependencies
    - uv sync --python 3.14
  script:
    - find . || true
    - ls -la docker_inspect.json || true
    - uv run python3.14 scripts/ci_docker_security_scan.py docker_inspect.json > docker_scan_results.json
  artifacts:
    name: "docker-verify-$CI_COMMIT_REF_SLUG"
    paths:
      - docker_scan_results.json
    expire_in: 1 week

rust:e2e-tests:
  stage: e2e
  image: rust:latest
  needs:
    - job: rust:build-test-lint
      artifacts: false
  before_script:
    - rustc --version
    - cargo --version
    - apt-get update -qq
    - apt-get install -y -qq curl expect
    - ./scripts/install-sccache.sh --ci
  cache:
    key: "${CI_COMMIT_REF_SLUG}"
    paths:
      - .sccache
    policy: pull
  script:
    - echo "===== Running E2E Tests ====="
    - cargo build --all --all-features --release
    - make test-e2e 2>&1 | tee e2e_output.txt || true
    - echo "===== sccache Statistics After E2E Tests ====="
    - sccache --show-stats
  artifacts:
    name: "e2e-artifacts-$CI_COMMIT_REF_SLUG"
    paths:
      - e2e_output.txt
    expire_in: 1 week
    when: always
  tags:
    - dind-amd
