
stages:
  - docker
  - rust
  - e2e

variables:
  DOCKER_HOST: "tcp://server-custom-dind.custom-dind:2375"
  # Move cargo data into the project directory so it can be cached by the runner
  CARGO_HOME: ${CI_PROJECT_DIR}/.cargo
  RUSTFLAGS: "-Dwarnings"
  RUSTDOCFLAGS: "-Dwarnings"
  RUST_BACKTRACE: "1"
  # sccache does not support incremental compilation; disable it globally
  CARGO_INCREMENTAL: "0"
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"
  # sccache configuration for build caching
  RUSTC_WRAPPER: sccache
  SCCACHE_DIR: ${CI_PROJECT_DIR}/.sccache
  SCCACHE_CACHE_SIZE: 5G

docker:build:
  stage: docker
  image: docker:27-cli
  script:
    - export COMMIT_SHA=$(git rev-parse --short HEAD)
    - echo "COMMIT_SHA=$COMMIT_SHA" >> build.env
    - echo "Building Python + Docker client image"
    - docker build -t $CI_REGISTRY_IMAGE:${COMMIT_SHA} .
    - docker inspect  $CI_REGISTRY_IMAGE:${COMMIT_SHA} | tee docker_inspect.json
    - docker run --rm $CI_REGISTRY_IMAGE:${COMMIT_SHA} ls
    - docker run --rm $CI_REGISTRY_IMAGE:${COMMIT_SHA} /usr/local/bin/editor --help
    # Verify cargo works offline
    - docker run --rm --net none $CI_REGISTRY_IMAGE:${COMMIT_SHA} cargo --offline build --all --all-features --release
    - docker run --rm --net none $CI_REGISTRY_IMAGE:${COMMIT_SHA} cargo --offline build --all --all-features
    # Push the image to the registry for
    - echo "$CI_REGISTRY_PASSWORD" | docker login $CI_REGISTRY -u $CI_REGISTRY_USER --password-stdin
    - docker push $CI_REGISTRY_IMAGE:${COMMIT_SHA}
    - docker tag ${CI_REGISTRY_IMAGE}:${COMMIT_SHA} ${CI_REGISTRY_IMAGE}:latest
    - docker push $CI_REGISTRY_IMAGE:latest
    - docker inspect $CI_REGISTRY_IMAGE:test | tee docker_inspect.json
  artifacts:
    name: "docker-verify-$CI_COMMIT_REF_SLUG"
    paths:
      - docker_inspect.json
    reports:
      dotenv: build.env
    expire_in: 1 week
  tags:
    - dind-amd

docker:test:
  stage: docker
  # Variable comes from artifacts->VARIABLE_NAME
  image: ${CI_REGISTRY_IMAGE}:${COMMIT_SHA}
  # https://gitlab.com/gitlab-org/gitlab-runner/-/work_items/903#:~:text=by%20Koen%20Lekkerkerker-,Problem,%F0%9F%91%8D%2022%20%F0%9F%91%8E%200
  needs:
    - job: docker:build
      artifacts: true
  variables:
    DOCKER_RUN_FLAGS: "--net none"
  script:
    - uname -a
#    - cargo --offline build --all --all-features --release
    #error: no matching package named `chrono` found
    #location searched: crates.io index
    #required by package `testcase-manager v0.1.0 (/builds/int/test-case-management-system/tcms-cli)`
    #As a reminder, you're using offline mode (--offline) which can sometimes cause surprising resolution failures, if this error is too confusing you may wish to retry without `--offline`.
#    - cargo --offline build --all --all-features
    - /usr/local/bin/editor --help
  tags:
    - dind-amd

docker:push:
  stage: docker
  image: docker:27-cli
  dependencies:
    - docker:build
    - docker:test
  needs:
    - job: docker:test
      artifacts: true
    - job: docker:build
      artifacts: true
  script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login $CI_REGISTRY -u $CI_REGISTRY_USER --password-stdin
    - find . || true
    - ls -la build.env || true
    - echo "COMMIT_SHA=$COMMIT_SHA" # Debugging output
    - echo "Pushing Docker image to registry"
    - echo "COMMIT_SHA=$COMMIT_SHA" # Debugging output
    - echo "CI_REGISTRY_IMAGE=$CI_REGISTRY_IMAGE" # Debugging output
    - echo "Pulling image ${CI_REGISTRY_IMAGE}:${COMMIT_SHA} to verify it exists before pushing latest tag" # Debugging output
    - docker pull ${CI_REGISTRY_IMAGE}:${COMMIT_SHA} || { echo "Failed to pull image ${CI_REGISTRY_IMAGE}:${COMMIT_SHA}. Check if the build stage pushed the image correctly."; exit 1; }
  # Variable comes from artifacts->VARIABLE_NAME
    - docker pull ${CI_REGISTRY_IMAGE}:${COMMIT_SHA}
    - docker tag ${CI_REGISTRY_IMAGE}:${COMMIT_SHA} ${CI_REGISTRY_IMAGE}:latest
#    - docker push $CI_REGISTRY_IMAGE:${COMMIT_SHA} - No need, already pushed
    - docker push $CI_REGISTRY_IMAGE:latest
#  only:
#    - master
#    - main
  tags:
    - dind-amd



rust:build-test-lint:
  before_script:
    - rustc --version
    - cargo --version
    - apt-get update -qq
    - apt-get install -y -qq curl
    # Install sccache using the installation script
    - ./scripts/install-sccache.sh --ci
    # Install coverage tools using the installation script
    - ./scripts/install-coverage-tools.sh --gitlab
  image: rust:latest
  cache:
    key: "${CI_COMMIT_REF_SLUG}"
    paths:
      # Cache the cargo home directory which contains registries and bins
#      - .cargo
      # Cache the build artifacts directory
#      - target
      # Cache sccache compilation cache
      - .sccache
    # This ensures the cache is available to all jobs in the pipeline
    policy: pull-push
  stage: rust
  script:
    # Add required components
    - rustup component add clippy rustfmt

    # Build
    - echo "===== Building Release Binaries ====="
    - cargo build --all --all-features --release
    - echo "===== sccache Statistics ====="
    - sccache --show-stats
    - mkdir -p artifacts/binaries
    - cp target/release/validate-yaml artifacts/binaries/ || true
    - cp target/release/validate-json artifacts/binaries/ || true
    - cp target/release/trm artifacts/binaries/ || true
    - cp target/release/test-verify artifacts/binaries/ || true
    - cp target/release/test-executor artifacts/binaries/ || true
    - cp target/release/test-orchestrator artifacts/binaries/ || true

    # Lint - rustfmt
    - echo "===== Running rustfmt ====="
    - cargo fmt --all -- --check

    # Lint - clippy
    - echo "===== Running Clippy ====="
    - cargo clippy --all --all-features --tests -- -D warnings 2>&1 | tee clippy_output.txt

    # Test - unit tests
    - echo "===== Running Unit Tests ====="
    - cargo test --all --all-features --tests --no-fail-fast -- --test-threads=1 2>&1 | tee test_output.txt
    - python3 scripts/ci_parse_test_results.py test_output.txt > test_results.json

    # Test - doc tests
    - echo "===== Running Doc Tests ====="
    - cargo test --doc 2>&1 | tee doc_test_output.txt || true
    - echo "===== sccache Statistics After Tests ====="
    - sccache --show-stats

    # Coverage
    - export CARGO_INCREMENTAL=0
    - export RUSTFLAGS="-Cinstrument-coverage"
    - export LLVM_PROFILE_FILE="coverage-%p-%m.profraw"
    - cargo test --all --all-features --tests
    - ./grcov . --binary-path ./target/debug/ -s . -t lcov --branch --ignore-not-existing --ignore "/*" -o lcov.info
    - ./grcov . --binary-path ./target/debug/ -s . -t html --branch --ignore-not-existing --ignore "/*" -o coverage/html
    - |
      if [ -n "$CI_MERGE_REQUEST_IID" ]; then
        python3 scripts/ci_compare_coverage.py lcov.info > coverage_report.json
        python3 scripts/ci_post_coverage_comment.py coverage_report.json
      fi
    - echo "===== Final sccache Statistics ====="
    - sccache --show-stats
  after_script:
    - |
      if [ -f test_results.json ]; then
        python3 scripts/ci_post_mr_comment.py test_results.json || true
      fi
    - |
      if [ -f clippy_output.txt ] && grep -q "warning:" clippy_output.txt; then
        python3 scripts/ci_post_clippy_comment.py clippy_output.txt || true
      fi
  coverage: '/lines\.*: \d+\.\d+%/'
  artifacts:
    name: "rust-artifacts-$CI_COMMIT_REF_SLUG"
    paths:
      - lcov.info
      - coverage/
      - coverage_report.json
      - test_output.txt
      - test_results.json
      - e2e_output.txt
      - doc_test_output.txt
      - clippy_output.txt
    reports:
      junit: test_results.xml
      coverage_report:
        coverage_format: cobertura
        path: cobertura.xml
    expire_in: 1 week
    when: always

docker:verify:
  stage: docker
  image: python:3.14-slim
  dependencies:
    - docker:build
  needs:
    - docker:build
  script:
    - find . || true
    - ls -la docker_inspect.json || true
    - python3 scripts/ci_docker_security_scan.py docker_inspect.json > docker_scan_results.json
  artifacts:
    name: "docker-verify-$CI_COMMIT_REF_SLUG"
    paths:
      - docker_scan_results.json
    expire_in: 1 week

rust:e2e-tests:
  stage: e2e
  image: rust:latest
  needs:
    - job: rust:build-test-lint
      artifacts: false
  before_script:
    - rustc --version
    - cargo --version
    - apt-get update -qq
    - apt-get install -y -qq curl expect
    - ./scripts/install-sccache.sh --ci
  cache:
    key: "${CI_COMMIT_REF_SLUG}"
    paths:
      - .sccache
    policy: pull
  script:
    - echo "===== Running E2E Tests ====="
    - cargo build --all --all-features --release
    - make test-e2e 2>&1 | tee e2e_output.txt || true
    - echo "===== sccache Statistics After E2E Tests ====="
    - sccache --show-stats
  artifacts:
    name: "e2e-artifacts-$CI_COMMIT_REF_SLUG"
    paths:
      - e2e_output.txt
    expire_in: 1 week
    when: always
  tags:
    - dind-amd
